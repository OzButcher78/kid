<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kid vs. Mütter 👦👵</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
  </style>
</head>
<body>
<div id="game"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  SPRITE-KONFIGURATION
// ═══════════════════════════════════════════════
// character.png  → 224x544 → 7 cols x 17 rows → 32x32 per frame
const CHAR = {
  frameW: 32, frameH: 32,
  idle:  { start: 0,  end: 3  },
  walkR: { start: 35, end: 41 },
  jump:  { start: 14, end: 14 },
  hurt:  { start: 42, end: 43 },
};

// NPC_OldWoman_0x.png → 288x288 → 6 cols x 6 rows → 48x48 per frame
const NPC = {
  frameW: 48, frameH: 48,
  idle:   { start: 0,  end: 1  },
  walk:   { start: 6,  end: 10 },
  attack: { start: 12, end: 14 },
};

// PineTrees.png → 1024x641 → 8 cols x 5 rows → 128x128 per frame
// Background-sheet.png → 384x864 → 1 col x 4 rows → 384x216 per frame

const GAME_W  = 800;
const GAME_H  = 560;
const LEVEL_W = 5200;

// ════════════════════════════════════
//  BOOT SCENE
// ════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor() { super({ key: 'Boot' }); }

  preload() {
    const bar = this.add.rectangle(GAME_W / 2 - 200, GAME_H / 2, 0, 14, 0x4ecdc4).setOrigin(0, 0.5);
    this.add.rectangle(GAME_W / 2, GAME_H / 2, 404, 18, 0x223322).setOrigin(0.5);
    this.add.text(GAME_W / 2, GAME_H / 2 - 30, 'LADEN...', {
      fontSize: '12px', fill: '#aaffaa', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);
    this.load.on('progress', v => { bar.width = 400 * v; });

    this.load.spritesheet('player', 'assets/character.png',       { frameWidth: CHAR.frameW,  frameHeight: CHAR.frameH  });
    this.load.spritesheet('enemy1', 'assets/NPC_OldWoman_01.png', { frameWidth: NPC.frameW,   frameHeight: NPC.frameH   });
    this.load.spritesheet('enemy2', 'assets/NPC_OldWoman_02.png', { frameWidth: NPC.frameW,   frameHeight: NPC.frameH   });
    this.load.image('bg',           'assets/Background.png');
    this.load.spritesheet('bgsheet',   'assets/Background-sheet.png', { frameWidth: 384, frameHeight: 216 });
    this.load.spritesheet('pinetrees', 'assets/PineTrees.png',        { frameWidth: 128, frameHeight: 128 });
    this.load.image('allpieces',    'assets/Allpieces.png');
  }

  create() {
    const anim = (key, src, start, end, rate, repeat = -1) =>
      this.anims.create({ key, frames: this.anims.generateFrameNumbers(src, { start, end }), frameRate: rate, repeat });

    anim('p-idle',  'player', CHAR.idle.start,  CHAR.idle.end,  6);
    anim('p-walk',  'player', CHAR.walkR.start, CHAR.walkR.end, 10);
    anim('p-jump',  'player', CHAR.jump.start,  CHAR.jump.end,  1, 0);
    anim('p-hurt',  'player', CHAR.hurt.start,  CHAR.hurt.end,  8, 0);

    anim('e1-idle',   'enemy1', NPC.idle.start,   NPC.idle.end,   4);
    anim('e1-walk',   'enemy1', NPC.walk.start,   NPC.walk.end,   8);
    anim('e1-attack', 'enemy1', NPC.attack.start, NPC.attack.end, 8, 0);
    anim('e2-idle',   'enemy2', NPC.idle.start,   NPC.idle.end,   4);
    anim('e2-walk',   'enemy2', NPC.walk.start,   NPC.walk.end,   8);
    anim('e2-attack', 'enemy2', NPC.attack.start, NPC.attack.end, 8, 0);

    this.scene.start('Menu');
  }
}

// ════════════════════════════════════
//  MENU SCENE
// ════════════════════════════════════
class MenuScene extends Phaser.Scene {
  constructor() { super({ key: 'Menu' }); }

  create() {
    const W = GAME_W, H = GAME_H;

    this.add.tileSprite(0, 0, W, H, 'bgsheet', 0).setOrigin(0).setAlpha(0.9);
    this.add.tileSprite(0, H - 216, W, 216, 'bgsheet', 2).setOrigin(0).setAlpha(0.7);

    const treeFrames = [0, 8, 16, 1, 9];
    for (let i = 0; i < 6; i++) {
      this.add.image(60 + i * 130, H - 80, 'pinetrees', treeFrames[i % 5])
        .setScale(1.4).setAlpha(0.65);
    }

    this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.42);

    this.add.sprite(200, H - 64, 'player').setScale(3).play('p-idle');
    const e1 = this.add.sprite(500, H - 58, 'enemy1').setScale(2.4).play('e1-walk');
    const e2 = this.add.sprite(630, H - 58, 'enemy2').setScale(2.4).play('e2-walk');
    e1.setFlipX(true);

    this.add.text(W / 2, 65, 'KID vs. MÜTTER', {
      fontSize: '26px', fill: '#ffd700', fontFamily: '"Press Start 2P"',
      stroke: '#5a0000', strokeThickness: 6
    }).setOrigin(0.5);
    this.add.text(W / 2, 108, 'rettet den Spielplatz!', {
      fontSize: '10px', fill: '#ffcccc', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);

    this.add.rectangle(W / 2, 215, 500, 95, 0x000000, 0.5);
    ['Pfeiltasten / WASD   Bewegen', 'LEERTASTE / ↑   Springen', 'Zweimal springen möglich!']
      .forEach((c, i) => this.add.text(W / 2, 186 + i * 27, c, {
        fontSize: '9px', fill: '#aaddff', fontFamily: '"Press Start 2P"'
      }).setOrigin(0.5));

    this.add.text(W / 2, 298, 'EINSAMMELN:', {
      fontSize: '10px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);
    [['Schild (gelb)', 'nächsten Treffer blocken'], ['Stern (gelb)', '5 Sek. unverwundbar'],
     ['Herz (rot)', '+1 Leben'], ['Stiefel (blau)', 'höher springen']]
      .forEach(([item, desc], i) => this.add.text(W / 2, 324 + i * 24, `• ${item}: ${desc}`, {
        fontSize: '8px', fill: '#cccccc', fontFamily: '"Press Start 2P"'
      }).setOrigin(0.5));

    const btn = this.add.text(W / 2, 462, ' SPIEL STARTEN ', {
      fontSize: '18px', fill: '#ffffff', fontFamily: '"Press Start 2P"',
      backgroundColor: '#8b1a1a', padding: { x: 18, y: 10 }
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    btn.on('pointerover', () => btn.setStyle({ fill: '#ffd700' }));
    btn.on('pointerout',  () => btn.setStyle({ fill: '#ffffff' }));
    btn.on('pointerdown', () => {
      this.cameras.main.fadeOut(400, 0, 0, 0);
      this.time.delayedCall(400, () => this.scene.start('Game'));
    });
    this.tweens.add({ targets: btn, alpha: 0.75, duration: 700, yoyo: true, repeat: -1 });
  }
}

// ════════════════════════════════════
//  GAME SCENE
// ════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'Game' }); }

  init() {
    this.lives        = 3;
    this.score        = 0;
    this.hasShield    = false;
    this.isStarPow    = false;
    this.hasSuperBoot = false;
    this.isHurt       = false;
    this.jumpCount    = 0;
    this.gameOver     = false;
    this.playerAnim   = '';
    this.projectiles  = [];
  }

  create() {
    const W = LEVEL_W;
    const H = GAME_H;

    this.physics.world.setBounds(0, 0, W, H + 300);

    // ── PARALLAX BACKGROUNDS ──────────────────────────────────────
    // Fixed to camera, offset adjusted in update()
    this.bg0 = this.add.tileSprite(0, 0, GAME_W, H, 'bgsheet', 0)
      .setOrigin(0).setScrollFactor(0).setDepth(0);
    this.bg1 = this.add.tileSprite(0, 0, GAME_W, H, 'bgsheet', 1)
      .setOrigin(0).setScrollFactor(0).setDepth(1).setAlpha(0.8);
    this.bg2 = this.add.tileSprite(0, H - 220, GAME_W, 220, 'bgsheet', 2)
      .setOrigin(0).setScrollFactor(0).setDepth(2).setAlpha(0.7);

    // Pine trees mid-ground
    const treeFrames = [0, 1, 2, 8, 9, 10, 16, 17, 18];
    for (let i = 0; i < 38; i++) {
      const x  = Phaser.Math.Between(0, W);
      const sc = Phaser.Math.FloatBetween(0.7, 1.5);
      this.add.image(x, H - 42 - sc * 52, 'pinetrees', treeFrames[i % treeFrames.length])
        .setScale(sc)
        .setScrollFactor(sc > 1.1 ? 0.25 : 0.15)
        .setDepth(3)
        .setAlpha(0.5 + sc * 0.08);
    }

    // ── PLATFORMS ────────────────────────────────────────────────
    this.platforms = this.physics.add.staticGroup();
    this.buildLevel(W, H);

    // ── PLAYER ───────────────────────────────────────────────────
    this.player = this.physics.add.sprite(120, H - 100, 'player');
    this.player.setScale(2.6).setCollideWorldBounds(true).setDepth(10);
    this.player.body.setSize(CHAR.frameW * 0.5, CHAR.frameH * 0.85);
    this.player.body.setOffset(CHAR.frameW * 0.25, CHAR.frameH * 0.12);
    this.setPlayerAnim('p-idle');

    // ── ENEMIES ──────────────────────────────────────────────────
    this.enemies = this.physics.add.group();
    this.spawnEnemies(H);

    // ── COLLECTIBLES ─────────────────────────────────────────────
    this.collTriggers = this.physics.add.staticGroup();
    this.spawnCollectibles(H);

    // ── GOAL ─────────────────────────────────────────────────────
    this.add.text(W - 155, H - 158, '🏁', { fontSize: '52px' }).setDepth(5);
    this.goalZone = this.add.zone(W - 155, H - 100, 80, 110).setOrigin(0.5);
    this.physics.world.enable(this.goalZone);
    this.goalZone.body.setAllowGravity(false);

    // ── COLLISIONS ───────────────────────────────────────────────
    this.physics.add.collider(this.player, this.platforms);
    this.physics.add.collider(this.enemies, this.platforms);
    this.physics.add.overlap(this.player, this.enemies,      this.onEnemyContact, null, this);
    this.physics.add.overlap(this.player, this.collTriggers, this.onCollect,       null, this);
    this.physics.add.overlap(this.player, this.goalZone,     this.onGoalReached,   null, this);

    // ── CAMERA ───────────────────────────────────────────────────
    this.cameras.main.setBounds(0, 0, W, H);
    this.cameras.main.startFollow(this.player, true, 0.1, 0.12);

    // ── INPUT ─────────────────────────────────────────────────────
    this.cursors  = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.aKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
    this.dKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
    this.wKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);

    this.scene.launch('HUD', { gameScene: this });
  }

  // ── Only switch animation when it actually changes → no more flickering ──
  setPlayerAnim(key) {
    if (this.playerAnim !== key) {
      this.playerAnim = key;
      this.player.play(key, true);
    }
  }

  buildLevel(W, H) {
    const gfx = this.add.graphics().setDepth(4);

    const addPlat = (x, y, w, h = 20, col = 0x4a7c44) => {
      gfx.fillStyle(col);
      gfx.fillRect(x - w / 2, y - h / 2, w, h);
      if (h <= 22) { gfx.fillStyle(0x66bb6a); gfx.fillRect(x - w / 2, y - h / 2, w, 5); }
      const r = this.add.rectangle(x, y, w, h).setVisible(false);
      this.physics.add.existing(r, true);
      this.platforms.add(r);
    };

    addPlat(W / 2, H - 16, W, 32, 0x3e2723);

    [
      [340,  H-110, 180], [600,  H-185, 150], [860,  H-130, 200],
      [1150, H-210, 180], [1400, H-155, 200], [1660, H-248, 160], [1910, H-175, 220],
      [2210, H-295, 180], [2470, H-208, 200], [2720, H-158, 180], [2970, H-248, 220],
      [3260, H-192, 200], [3510, H-288, 180], [3760, H-203, 200], [4010, H-168, 180],
      [4290, H-243, 200], [4540, H-178, 180], [4790, H-298, 200], [5010, H-213, 220],
      [730,  H-325,  90], [1260, H-345,  90], [2060, H-395,  90],
      [2910, H-363,  90], [3660, H-415,  90], [4460, H-385,  90],
    ].forEach(([x, y, w]) => addPlat(x, y, w));
  }

  spawnEnemies(H) {
    [
      [430,  H-75,  'enemy1', 100], [830,  H-75,  'enemy2', 80],
      [1210, H-185, 'enemy1',  90], [1630, H-228, 'enemy2', 65],
      [2060, H-75,  'enemy1', 110], [2390, H-188, 'enemy2', 75],
      [2760, H-75,  'enemy1',  95], [3110, H-228, 'enemy2', 70],
      [3530, H-268, 'enemy1',  85], [3890, H-75,  'enemy2', 90],
      [4320, H-223, 'enemy1',  80], [4660, H-75,  'enemy2',100],
      [4980, H-193, 'enemy1',  90],
    ].forEach(([x, y, key, patrol]) => {
      const e = this.physics.add.sprite(x, y, key);
      e.setScale(2.0).setCollideWorldBounds(true).setDepth(8);
      e.enemyType   = key;
      e.patrolStart = x - patrol;
      e.patrolEnd   = x + patrol;
      e.direction   = 1;
      e.shootTimer  = Phaser.Math.Between(80, 200);
      e.curAnim     = '';
      e.body.setSize(NPC.frameW * 0.52, NPC.frameH * 0.78);
      e.body.setOffset(NPC.frameW * 0.24, NPC.frameH * 0.18);
      this.setEnemyAnim(e, key === 'enemy1' ? 'e1-walk' : 'e2-walk');
      this.enemies.add(e);
    });
  }

  setEnemyAnim(e, key) {
    if (e.curAnim !== key) { e.curAnim = key; e.play(key, true); }
  }

  spawnCollectibles(H) {
    const colors = { shield: 0xffd700, star: 0xffff00, heart: 0xff3366, boots: 0x00ccff };
    const labels = { shield: 'SCHILD', star: 'STERN', heart: 'HERZ', boots: 'STIEFEL' };

    [
      [380,  H-165, 'shield'], [730,  H-378, 'star'  ],
      [1110, H-263, 'heart' ], [1660, H-308, 'boots' ],
      [2060, H-448, 'shield'], [2360, H-263, 'star'  ],
      [2720, H-213, 'heart' ], [3110, H-303, 'boots' ],
      [3510, H-343, 'shield'], [3760, H-468, 'star'  ],
      [4060, H-223, 'heart' ], [4460, H-438, 'boots' ],
    ].forEach(([x, y, type]) => {
      const col  = colors[type];
      const glow = this.add.circle(x, y, 22, col, 0.25).setDepth(5);
      const bg   = this.add.circle(x, y, 14, col, 0.95).setDepth(6);
      // Use a text label instead of emoji (avoids rendering inconsistencies)
      const lbl  = this.add.text(x, y, labels[type], {
        fontSize: '5px', fill: '#000000', fontFamily: '"Press Start 2P"'
      }).setOrigin(0.5).setDepth(7);

      const rect = this.add.rectangle(x, y, 30, 30).setVisible(false);
      this.physics.add.existing(rect, true);
      rect.bonusType = type;
      rect.visuals   = [glow, bg, lbl];
      this.collTriggers.add(rect);

      this.tweens.add({
        targets: [bg, lbl, glow], y: y - 8,
        duration: 900, yoyo: true, repeat: -1,
        ease: 'Sine.inOut', delay: Phaser.Math.Between(0, 800)
      });
    });
  }

  // ════════════════════════════════
  //  UPDATE
  // ════════════════════════════════
  update() {
    if (this.gameOver || !this.player?.active) return;

    // Parallax scroll – offset based on camera X position
    const camX = this.cameras.main.scrollX;
    this.bg0.tilePositionX = camX * 0.05;
    this.bg1.tilePositionX = camX * 0.12;
    this.bg2.tilePositionX = camX * 0.22;

    this.handlePlayer();
    this.handleEnemies();
    this.checkProjectiles();

    if (this.player.y > GAME_H + 100) {
      this.takeDamage();
      this.player.setPosition(Math.max(100, this.player.x - 200), GAME_H - 160);
      this.player.setVelocity(0, 0);
    }
  }

  handlePlayer() {
    const onGround = this.player.body.blocked.down;
    if (onGround) this.jumpCount = 0;

    const left  = this.cursors.left.isDown  || this.aKey.isDown;
    const right = this.cursors.right.isDown || this.dKey.isDown;
    const jump  = Phaser.Input.Keyboard.JustDown(this.cursors.up)  ||
                  Phaser.Input.Keyboard.JustDown(this.spaceKey)    ||
                  Phaser.Input.Keyboard.JustDown(this.wKey);

    if (left) {
      this.player.setVelocityX(-190);
      this.player.setFlipX(true);
      if (onGround && !this.isHurt) this.setPlayerAnim('p-walk');
    } else if (right) {
      this.player.setVelocityX(190);
      this.player.setFlipX(false);
      if (onGround && !this.isHurt) this.setPlayerAnim('p-walk');
    } else {
      this.player.setVelocityX(0);
      if (onGround && !this.isHurt) this.setPlayerAnim('p-idle');
    }

    if (!onGround && !this.isHurt) this.setPlayerAnim('p-jump');

    if (jump && this.jumpCount < 2) {
      const vel = this.jumpCount === 0
        ? (this.hasSuperBoot ? -570 : -430)
        : -290;
      this.player.setVelocityY(vel);
      this.jumpCount++;
      this.spawnParticles(this.player.x, this.player.y + 30, 0xffffff, 4);
    }
  }

  handleEnemies() {
    this.enemies.getChildren().forEach(e => {
      if (!e.active) return;
      const distX = this.player.x - e.x;
      const dist  = Math.abs(distX);

      if (e.enemyType === 'enemy2' && dist < 260) {
        const dir = distX > 0 ? 1 : -1;
        e.setVelocityX(dir * 72);
        e.setFlipX(dir < 0);
        this.setEnemyAnim(e, 'e2-walk');
        return;
      }

      e.setVelocityX(e.direction * 52);
      e.setFlipX(e.direction < 0);
      this.setEnemyAnim(e, e.enemyType === 'enemy1' ? 'e1-walk' : 'e2-walk');
      if (e.x <= e.patrolStart) e.direction =  1;
      if (e.x >= e.patrolEnd)   e.direction = -1;

      if (e.enemyType === 'enemy1') {
        e.shootTimer--;
        if (e.shootTimer <= 0 && dist < 400 && dist > 55) {
          e.shootTimer = Phaser.Math.Between(110, 180);
          this.throwShoe(e);
          this.setEnemyAnim(e, 'e1-attack');
          this.time.delayedCall(650, () => { if (e?.active) this.setEnemyAnim(e, 'e1-walk'); });
        }
      }
    });
  }

  throwShoe(enemy) {
    const dirX = this.player.x < enemy.x ? -1 : 1;
    const sx   = enemy.x + dirX * 24;
    const sy   = enemy.y - 20;

    // Solid red-brown rectangle = clearly visible "shoe"
    const shoe = this.add.rectangle(sx, sy, 24, 11, 0xc0392b).setDepth(12);
    const trim = this.add.rectangle(sx, sy, 24, 4,  0x7b0000).setDepth(13);
    trim.setY(sy + 3);

    this.physics.add.existing(shoe);
    shoe.body.setAllowGravity(true);
    shoe.body.setGravityY(-600);         // mostly flat flight path
    shoe.body.setVelocity(dirX * 270, -50);
    shoe.body.setSize(24, 11);

    shoe.trim     = trim;
    shoe.dirX     = dirX;
    shoe.isActive = true;
    this.projectiles.push(shoe);

    // Spin tween
    this.tweens.add({ targets: [shoe, trim], angle: dirX * 360, duration: 450, repeat: -1 });

    this.time.delayedCall(3200, () => this.destroyShoe(shoe));
  }

  destroyShoe(shoe) {
    if (!shoe || !shoe.isActive) return;
    shoe.isActive = false;
    shoe.trim?.destroy();
    shoe.destroy();
  }

  checkProjectiles() {
    const pb = this.player.getBounds();
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      const shoe = this.projectiles[i];
      if (!shoe?.active || !shoe.isActive) {
        this.projectiles.splice(i, 1);
        continue;
      }
      // Hit a platform
      if (shoe.body?.blocked.down || shoe.body?.blocked.left || shoe.body?.blocked.right) {
        this.destroyShoe(shoe);
        this.projectiles.splice(i, 1);
        continue;
      }
      // Hit player
      if (Phaser.Geom.Intersects.RectangleToRectangle(shoe.getBounds(), pb)) {
        this.destroyShoe(shoe);
        this.projectiles.splice(i, 1);
        this.takeDamage();
      }
    }
  }

  onEnemyContact(player, enemy) {
    if (!enemy.active) return;
    if (player.body.velocity.y > 20 && player.body.bottom < enemy.body.center.y + 14) {
      this.score += 100;
      this.showFloat(enemy.x, enemy.y - 20, '+100', '#ffd700');
      this.spawnParticles(enemy.x, enemy.y, 0xff6666, 8);
      enemy.destroy();
      player.setVelocityY(-300);
    } else {
      this.takeDamage();
    }
  }

  onCollect(player, trigger) {
    if (!trigger.active) return;
    const type = trigger.bonusType;
    trigger.visuals?.forEach(v => v.destroy());
    trigger.destroy();
    this.score += 50;
    this.spawnParticles(player.x, player.y - 20, 0xffffff, 6);

    switch (type) {
      case 'shield':
        this.hasShield = true;
        this.events.emit('shieldOn');
        this.showFloat(player.x, player.y - 50, 'SCHILD!', '#ffd700');
        break;
      case 'star':
        this.isStarPow = true;
        this.player.setTint(0xffff55);
        this.events.emit('starOn', 5000);
        this.showFloat(player.x, player.y - 50, 'UNVERWUNDBAR!', '#ffff44');
        this.time.delayedCall(5000, () => {
          this.isStarPow = false;
          this.player?.clearTint();
          this.events.emit('starOff');
        });
        break;
      case 'heart':
        this.lives = Math.min(this.lives + 1, 5);
        this.events.emit('livesChanged', this.lives);
        this.showFloat(player.x, player.y - 50, '+1 LEBEN!', '#ff3366');
        break;
      case 'boots':
        this.hasSuperBoot = true;
        this.events.emit('bootsOn', 10000);
        this.showFloat(player.x, player.y - 50, 'SUPER-SPRUNG!', '#00ccff');
        this.time.delayedCall(10000, () => {
          this.hasSuperBoot = false;
          this.events.emit('bootsOff');
        });
        break;
    }
  }

  onGoalReached() {
    if (this.gameOver) return;
    this.gameOver = true;
    this.physics.pause();
    this.cameras.main.flash(500, 255, 255, 100);
    this.time.delayedCall(900, () => {
      this.scene.stop('HUD');
      this.scene.start('GameOver', { won: true, score: this.score });
    });
  }

  takeDamage() {
    if (this.isHurt || this.isStarPow || this.gameOver) return;
    if (this.hasShield) {
      this.hasShield = false;
      this.events.emit('shieldOff');
      this.showFloat(this.player.x, this.player.y - 50, 'GEBLOCKT!', '#ffd700');
      this.cameras.main.shake(100, 0.006);
      return;
    }
    this.lives--;
    this.isHurt = true;
    this.events.emit('livesChanged', this.lives);
    this.cameras.main.shake(220, 0.013);

    // Force hurt animation
    this.playerAnim = '';
    this.player.play('p-hurt', true);
    this.player.setTint(0xff4444);

    const kDir = this.player.flipX ? 1 : -1;
    this.player.setVelocity(kDir * 200, -250);

    this.tweens.add({
      targets: this.player, alpha: 0.3, duration: 100, yoyo: true, repeat: 7,
      onComplete: () => {
        if (!this.player?.active) return;
        this.player.setAlpha(1);
        this.player.clearTint();
        this.isHurt = false;
        this.playerAnim = '';
      }
    });

    if (this.lives <= 0) {
      this.gameOver = true;
      this.time.delayedCall(800, () => {
        this.scene.stop('HUD');
        this.scene.start('GameOver', { won: false, score: this.score });
      });
    }
  }

  showFloat(x, y, msg, color = '#fff') {
    const t = this.add.text(x, y, msg, {
      fontSize: '11px', fill: color,
      fontFamily: '"Press Start 2P"',
      stroke: '#000000', strokeThickness: 3
    }).setOrigin(0.5).setDepth(20);
    this.tweens.add({
      targets: t, y: y - 55, alpha: 0, duration: 1200,
      ease: 'Cubic.Out', onComplete: () => t.destroy()
    });
  }

  spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = this.add.circle(x, y, Phaser.Math.Between(3, 7), color).setDepth(15);
      const a = Phaser.Math.Between(0, 360);
      const s = Phaser.Math.Between(70, 170);
      this.tweens.add({
        targets: p,
        x: x + Math.cos(a) * s * 0.8,
        y: y + Math.sin(a) * s * 0.8 - 35,
        alpha: 0, scaleX: 0.1, scaleY: 0.1,
        duration: Phaser.Math.Between(400, 750),
        onComplete: () => p.destroy()
      });
    }
  }
}

// ════════════════════════════════════
//  HUD SCENE
// ════════════════════════════════════
class HUDScene extends Phaser.Scene {
  constructor() { super({ key: 'HUD' }); }
  init(data) { this.gs = data.gameScene; }

  create() {
    const W = GAME_W;
    this.add.rectangle(W / 2, 22, W, 44, 0x000000, 0.52);

    this.livesDisplay = this.add.text(14, 9,  'HHH', {
      fontSize: '22px', fill: '#ff3366'
    }).setText(this.buildLives(3));

    this.shieldIcon = this.add.text(14, 33, '[SCHILD]', {
      fontSize: '9px', fill: '#ffd700', fontFamily: '"Press Start 2P"'
    }).setVisible(false);

    this.starBar  = this.createBar(120, 36, 0xffff00);
    this.bootBar  = this.createBar(120, 36, 0x00ccff);

    this.scoreTxt = this.add.text(W - 14, 9, 'PUNKTE: 0', {
      fontSize: '10px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setOrigin(1, 0);

    this.gs.events.on('livesChanged', n  => this.livesDisplay.setText(this.buildLives(n)));
    this.gs.events.on('shieldOn',     () => this.shieldIcon.setVisible(true));
    this.gs.events.on('shieldOff',    () => this.shieldIcon.setVisible(false));
    this.gs.events.on('starOn',  ms => this.startBar(this.starBar, ms, 'STERN'));
    this.gs.events.on('starOff', ()  => this.starBar.setVisible(false));
    this.gs.events.on('bootsOn', ms => this.startBar(this.bootBar, ms, 'BOOT'));
    this.gs.events.on('bootsOff',()  => this.bootBar.setVisible(false));

    this.time.addEvent({
      delay: 120, loop: true,
      callback: () => { if (this.gs) this.scoreTxt.setText('PUNKTE: ' + this.gs.score); }
    });

    this.events.on('shutdown', () => {
      ['livesChanged','shieldOn','shieldOff','starOn','starOff','bootsOn','bootsOff']
        .forEach(ev => this.gs.events.off(ev));
    });
  }

  buildLives(n) {
    return '♥ '.repeat(Math.max(0, n)).trim();
  }

  createBar(x, y, color) {
    const g = this.add.graphics();
    g.bx = x; g.by = y; g.bc = color;
    return g.setVisible(false).setDepth(5);
  }

  startBar(bar, duration, label) {
    bar.setVisible(true);
    const started = this.time.now;
    const lbl = this.add.text(bar.bx, bar.by - 10, label, {
      fontSize: '7px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setDepth(6);
    const interval = this.time.addEvent({
      delay: 50, loop: true,
      callback: () => {
        const t = Math.max(0, 1 - (this.time.now - started) / duration);
        bar.clear();
        bar.fillStyle(0x000000, 0.5);
        bar.fillRect(bar.bx, bar.by, 90, 7);
        bar.fillStyle(bar.bc);
        bar.fillRect(bar.bx, bar.by, 90 * t, 7);
        if (t <= 0) { bar.setVisible(false); lbl.destroy(); interval.remove(); }
      }
    });
  }
}

// ════════════════════════════════════
//  GAME OVER SCENE
// ════════════════════════════════════
class GameOverScene extends Phaser.Scene {
  constructor() { super({ key: 'GameOver' }); }
  init(d) { this.won = d.won; this.score = d.score || 0; }

  create() {
    const W = GAME_W, H = GAME_H;
    this.add.tileSprite(0, 0, W, H, 'bgsheet', 0).setOrigin(0);
    this.add.rectangle(W / 2, H / 2, W, H, 0x000000, this.won ? 0.4 : 0.65);

    if (this.won) {
      for (let i = 0; i < 50; i++) {
        const s = this.add.text(
          Phaser.Math.Between(0, W), Phaser.Math.Between(0, H),
          '*', { fontSize: `${Phaser.Math.Between(12, 28)}px`, fill: '#ffd700' }
        );
        this.tweens.add({ targets: s, alpha: 0.1, duration: Phaser.Math.Between(600, 1400), yoyo: true, repeat: -1 });
      }
    }

    this.add.text(W / 2, 120, this.won ? 'GEWONNEN!' : 'GAME OVER', {
      fontSize: '26px', fill: this.won ? '#ffd700' : '#ff4444',
      fontFamily: '"Press Start 2P"', stroke: '#000', strokeThickness: 5
    }).setOrigin(0.5);

    this.add.text(W / 2, 205, 'PUNKTE: ' + this.score, {
      fontSize: '18px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);

    this.add.text(W / 2, 300,
      this.won
        ? 'Du hast alle Muetter ueberlebt!\n    HELD DES SPIELPLATZES!'
        : 'Die Muetter waren zu stark...\n      Versuch es nochmal!',
      { fontSize: '12px', fill: '#cccccc', fontFamily: '"Press Start 2P"', align: 'center', lineSpacing: 10 }
    ).setOrigin(0.5);

    this.makeBtn(W / 2, 420, 'NOCHMAL',     this.won ? '#1e6e3a' : '#8b1a1a',
      () => { this.fade(() => this.scene.start('Game')); });
    this.makeBtn(W / 2, 490, 'HAUPTMENUE',  '#1a2a3a',
      () => { this.fade(() => this.scene.start('Menu')); });
  }

  fade(cb) {
    this.cameras.main.fadeOut(300, 0, 0, 0);
    this.time.delayedCall(300, cb);
  }

  makeBtn(x, y, label, bg, cb) {
    const btn = this.add.text(x, y, '  ' + label + '  ', {
      fontSize: '16px', fill: '#fff', fontFamily: '"Press Start 2P"',
      backgroundColor: bg, padding: { x: 14, y: 10 }
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    btn.on('pointerover',  () => btn.setAlpha(0.8));
    btn.on('pointerout',   () => btn.setAlpha(1.0));
    btn.on('pointerdown',  cb);
  }
}

// ════════════════════════════════════
//  START
// ════════════════════════════════════
new Phaser.Game({
  type: Phaser.AUTO,
  width:  GAME_W,
  height: GAME_H,
  parent: 'game',
  backgroundColor: '#6aadbb',
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 750 },
      debug: false   // true = Hitboxen sichtbar machen
    }
  },
  scene: [BootScene, MenuScene, GameScene, HUDScene, GameOverScene]
});
</script>
