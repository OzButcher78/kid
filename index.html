<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kind vs. Mütter 👦👵</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
  </style>
</head>
<body>
<div id="game"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
/*
 * SCENES: Boot → Menu → Game (+ HUD parallel) → GameOver
 * ASSETS: assets/char1/Clothes 1/ (player frames), assets/enemy/ (enemy frames),
 *         assets/Fruits/ (fruit spritesheets), Background-sheet.png, PineTrees.png
 * PHYSICS: Arcade, gravity y=750
 */

// PineTrees.png → 1024x641 → 8 cols x 5 rows → 128x128 per frame
// Background-sheet.png → 384x864 → 1 col x 4 rows → 384x216 per frame

const GAME_W  = 800;
const GAME_H  = 560;
const LEVEL_W = 5200;

// ════════════════════════════════════
//  SOUND FX  (Web Audio API – no files needed)
//  NOTE: SFX.ctx() creates/resumes the AudioContext. Per browser autoplay policy,
//  AudioContext starts suspended until a user gesture. SFX methods are only ever
//  called after the player clicks "SPIEL STARTEN", so this is safe.
// ════════════════════════════════════
const SFX = {
  _ctx: null,
  ctx() {
    if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this._ctx.state === 'suspended') this._ctx.resume();
    return this._ctx;
  },
  _tone(type, freqStart, freqEnd, dur, vol = 0.22, delay = 0) {
    try {
      const c = this.ctx(), t = c.currentTime + delay;
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type;
      o.frequency.setValueAtTime(freqStart, t);
      if (freqEnd !== freqStart) o.frequency.exponentialRampToValueAtTime(freqEnd, t + dur);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.start(t); o.stop(t + dur);
    } catch(e) {}
  },
  jump()     { this._tone('square',   180, 480, 0.14, 0.18); },
  land()     { this._tone('sine',     130,  65, 0.09, 0.28); },
  stomp()    { this._tone('sawtooth', 220,  80, 0.22, 0.30); },
  hurt()     { this._tone('sawtooth', 380, 140, 0.28, 0.28); },
  shoe()     { this._tone('triangle', 290, 170, 0.09, 0.14); },
  blocked()  { this._tone('sine',     550, 660, 0.10, 0.22); },
  collect()  {
    this._tone('sine', 520, 780, 0.10, 0.22, 0.00);
    this._tone('sine', 780, 960, 0.10, 0.22, 0.10);
  },
  win() {
    [261, 329, 392, 523].forEach((f, i) =>
      this._tone('sine', f, f, 0.22, 0.22, i * 0.13));
  },
  gameover() {
    [380, 280, 200, 140].forEach((f, i) =>
      this._tone('sawtooth', f, f * 0.7, 0.28, 0.28, i * 0.16));
  },
};

// ════════════════════════════════════
//  BOOT SCENE
// ════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor() { super({ key: 'Boot' }); }

  preload() {
    const bar = this.add.rectangle(GAME_W / 2 - 200, GAME_H / 2, 0, 14, 0x4ecdc4).setOrigin(0, 0.5);
    this.add.rectangle(GAME_W / 2, GAME_H / 2, 404, 18, 0x223322).setOrigin(0.5);
    this.add.text(GAME_W / 2, GAME_H / 2 - 30, 'LADEN...', {
      fontSize: '12px', fill: '#aaffaa', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);
    this.load.on('progress', v => { bar.width = 400 * v; });
    // Log and display load/process errors on-screen (up to 5 visible)
    const failedFiles = [];
    this.load.on('loaderror', (file) => {
      console.error('Load error:', file.type, file.key, '→', file.src);
      failedFiles.push(file.key);
      if (failedFiles.length <= 5) {
        this.add.text(GAME_W / 2, GAME_H / 2 + 30 + failedFiles.length * 14,
          `FAIL: ${file.key} — ${file.src?.split('/').slice(-2).join('/')}`,
          { fontSize: '7px', fill: '#ff4444', fontFamily: 'monospace' }
        ).setOrigin(0.5);
      }
    });

    // Player individual frames (64×64 each)
    const pBase = 'assets/char1/Character1M_1_';
    ['idle','walk','run'].forEach(anim => {
      for (let i = 0; i < 8; i++)
        this.load.image(`p-${anim}-${i}`, `${pBase}${anim}_${i}.png`);
    });
    // jump: 2 frames
    for (let i = 0; i < 2; i++) this.load.image(`p-jump-${i}`, `${pBase}jump_${i}.png`);
    // fall: 2 frames
    for (let i = 0; i < 2; i++) this.load.image(`p-fall-${i}`, `${pBase}fall_${i}.png`);
    // damage: 2 frames
    for (let i = 0; i < 2; i++) this.load.image(`p-hurt-${i}`, `${pBase}damage_${i}.png`);

    // Enemy individual frames (64×64 each)
    const eBase = 'assets/enemy/Character1F_1_';
    ['idle','walk','run'].forEach(anim => {
      for (let i = 0; i < 8; i++)
        this.load.image(`e-${anim}-${i}`, `${eBase}${anim}_${i}.png`);
    });
    // punch (attack): 6 frames
    for (let i = 0; i < 6; i++) this.load.image(`e-punch-${i}`, `${eBase}punch_${i}.png`);
    // damage: 2 frames
    for (let i = 0; i < 2; i++) this.load.image(`e-hurt-${i}`, `${eBase}damage_${i}.png`);

    // Fruits (spritesheets 544×32, 17 frames at 32×32)
    const fruits = ['Apple','Bananas','Cherries','Kiwi','Melon','Orange','Pineapple','Strawberry'];
    fruits.forEach(name => {
      this.load.spritesheet(`fruit-${name.toLowerCase()}`, `assets/Fruits/${name}.png`,
        { frameWidth: 32, frameHeight: 32 });
    });

    this.load.spritesheet('bgsheet',   'assets/Background-sheet.png', { frameWidth: 384, frameHeight: 216 });
    this.load.spritesheet('pinetrees', 'assets/PineTrees.png',        { frameWidth: 128, frameHeight: 128 });

    // Boxes — three visual styles, each with Idle / Hit / Break frames
    ['Box1','Box2','Box3'].forEach((box, i) => {
      const k = `box${i + 1}`;
      this.load.image(`${k}-idle`,  `assets/Boxes/${box}/Idle.png`);
      this.load.image(`${k}-hit`,   encodeURI(`assets/Boxes/${box}/Hit (28x24).png`));
      this.load.image(`${k}-break`, `assets/Boxes/${box}/Break.png`);
    });

    // Checkpoints & end marker
    this.load.image('cp-noflag', encodeURI('assets/Checkpoints/Checkpoint/Checkpoint (No Flag).png'));
    this.load.image('cp-idle',   encodeURI('assets/Checkpoints/Checkpoint/Checkpoint (Flag Idle)(64x64).png'));
    this.load.image('end-idle',  encodeURI('assets/Checkpoints/End/End (Idle).png'));
    this.load.image('end-press', encodeURI('assets/Checkpoints/End/End (Pressed) (64x64).png'));

    // New UI assets
    this.load.spritesheet('shield-ring', 'assets/03.png', { frameWidth: 48, frameHeight: 36 });
    this.load.spritesheet('health-bar',  'assets/05.png', { frameWidth: 48, frameHeight: 32 });
    this.load.spritesheet('bonus-bars',  'assets/06.png', { frameWidth: 128, frameHeight: 24 });
  }

  create() {
    try {
      // Helper: build frames array from image keys
      const imgFrames = (prefix, count) =>
        Array.from({ length: count }, (_, i) => ({ key: `${prefix}-${i}` }));

      // Player animations
      this.anims.create({ key: 'p-idle', frames: imgFrames('p-idle', 8), frameRate: 8,  repeat: -1 });
      this.anims.create({ key: 'p-walk', frames: imgFrames('p-walk', 8), frameRate: 10, repeat: -1 });
      this.anims.create({ key: 'p-run',  frames: imgFrames('p-run',  8), frameRate: 12, repeat: -1 });
      this.anims.create({ key: 'p-jump', frames: imgFrames('p-jump', 2), frameRate: 8,  repeat: 0  });
      this.anims.create({ key: 'p-fall', frames: imgFrames('p-fall', 2), frameRate: 8,  repeat: -1 });
      this.anims.create({ key: 'p-hurt', frames: imgFrames('p-hurt', 2), frameRate: 10, repeat: 0  });

      // Enemy animations (single sprite set used for both enemy types)
      this.anims.create({ key: 'e-idle',  frames: imgFrames('e-idle',  8), frameRate: 8,  repeat: -1 });
      this.anims.create({ key: 'e-walk',  frames: imgFrames('e-walk',  8), frameRate: 8,  repeat: -1 });
      this.anims.create({ key: 'e-run',   frames: imgFrames('e-run',   8), frameRate: 10, repeat: -1 });
      this.anims.create({ key: 'e-punch', frames: imgFrames('e-punch', 6), frameRate: 10, repeat: 0  });
      this.anims.create({ key: 'e-hurt',  frames: imgFrames('e-hurt',  2), frameRate: 10, repeat: 0  });

      // Fruit animations (17 frames each at 15fps, looping)
      // Guard: generateFrameNumbers returns undefined if the spritesheet failed to load.
      // Skip creating the animation rather than crashing on .duration access.
      ['apple','bananas','cherries','kiwi','melon','orange','pineapple','strawberry'].forEach(name => {
        const frames = this.anims.generateFrameNumbers(`fruit-${name}`, { start: 0, end: 16 });
        if (!frames || frames.length === 0) {
          console.warn(`Skipping animation fruit-${name}: spritesheet not loaded`);
          return;
        }
        this.anims.create({ key: `fruit-${name}`, frames, frameRate: 15, repeat: -1 });
      });

      // Shield ring animation (row 1 of 03.png, frames 0-4)
      this.anims.create({ key: 'shield-ring', frames: this.anims.generateFrameNumbers('shield-ring', { start: 0, end: 4 }), frameRate: 8, repeat: -1 });

      this.scene.start('Menu');
    } catch(err) {
      console.error('BootScene create error:', err);
      this.add.text(GAME_W/2, GAME_H/2 + 60, 'ERROR: ' + err.message, {
        fontSize: '8px', fill: '#ff0000', fontFamily: 'monospace', wordWrap: { width: 700 }
      }).setOrigin(0.5);
    }
  }
}

// ════════════════════════════════════
//  MENU SCENE
// ════════════════════════════════════
class MenuScene extends Phaser.Scene {
  constructor() { super({ key: 'Menu' }); }

  create() {
    const W = GAME_W, H = GAME_H;

    this.add.tileSprite(0, 0, W, H, 'bgsheet', 0).setOrigin(0).setAlpha(0.9);
    this.add.tileSprite(0, H - 216, W, 216, 'bgsheet', 2).setOrigin(0).setAlpha(0.7);

    const treeFrames = [0, 8, 16, 1, 9];
    for (let i = 0; i < 6; i++) {
      this.add.image(60 + i * 130, H - 80, 'pinetrees', treeFrames[i % 5])
        .setScale(1.4).setAlpha(0.65);
    }

    this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.42);

    this.add.sprite(200, H - 64, 'p-idle-0').setScale(1.5).play('p-idle');
    const e1 = this.add.sprite(500, H - 58, 'e-walk-0').setScale(1.5).play('e-walk');
    const e2 = this.add.sprite(630, H - 58, 'e-walk-0').setScale(1.5).play('e-walk').setTint(0xffbbcc);
    e1.setFlipX(true);

    this.add.text(W / 2, 65, 'KIND vs. MÜTTER', {
      fontSize: '26px', fill: '#ffd700', fontFamily: '"Press Start 2P"',
      stroke: '#5a0000', strokeThickness: 6
    }).setOrigin(0.5);
    this.add.text(W / 2, 108, 'enkommt die Müttern', {
      fontSize: '10px', fill: '#ffcccc', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);

    this.add.rectangle(W / 2, 215, 500, 95, 0x000000, 0.5);
    ['Pfeiltasten / WASD   Bewegen', 'LEERTASTE / ↑   Springen', 'Zweimal springen möglich!']
      .forEach((c, i) => this.add.text(W / 2, 186 + i * 27, c, {
        fontSize: '9px', fill: '#aaddff', fontFamily: '"Press Start 2P"'
      }).setOrigin(0.5));

    this.add.text(W / 2, 298, 'EINSAMMELN:', {
      fontSize: '10px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);
    [['Schild (gold)', 'Nächster Treffer geblockt'],
     ['Turbo (cyan)', '8 Sek. schneller laufen'],
     ['Apfel (orange)', '3 Äpfel werfen — Taste Q'],
     ['Herz (rot)', '+1 Leben']]
      .forEach(([item, desc], i) => this.add.text(W / 2, 324 + i * 24, `• ${item}: ${desc}`, {
        fontSize: '8px', fill: '#cccccc', fontFamily: '"Press Start 2P"'
      }).setOrigin(0.5));

    const btn = this.add.text(W / 2, 462, ' SPIEL STARTEN ', {
      fontSize: '18px', fill: '#ffffff', fontFamily: '"Press Start 2P"',
      backgroundColor: '#8b1a1a', padding: { x: 18, y: 10 }
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    btn.on('pointerover', () => btn.setStyle({ fill: '#ffd700' }));
    btn.on('pointerout',  () => btn.setStyle({ fill: '#ffffff' }));
    btn.on('pointerdown', () => {
      this.cameras.main.fadeOut(400, 0, 0, 0);
      this.time.delayedCall(400, () => this.scene.start('Game'));
    });
    this.tweens.add({ targets: btn, alpha: 0.75, duration: 700, yoyo: true, repeat: -1 });
  }
}

// ════════════════════════════════════
//  GAME SCENE
// ════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'Game' }); }

  init() {
    this.lives        = 3;
    this.score        = 0;
    this.hasShield    = false;
    this.hasSpeed     = false;   // speed boost active
    this.hasApple     = false;   // apple throwing active
    this.appleCount   = 0;       // apples remaining
    this.playerApples = [];      // active player-thrown apples
    this.isHurt       = false;
    this.jumpCount    = 0;
    this.gameOver     = false;
    this.playerAnim   = '';
    this.projectiles  = [];
    this.wasOnGround  = true;
    this.groundFrames = 0;
    this.respawnX     = 120;
    this.respawnY     = GAME_H - 68;
  }

  create() {
    const W = LEVEL_W;
    const H = GAME_H;

    this.physics.world.setBounds(0, 0, W, H + 300);

    // ── PARALLAX BACKGROUNDS ──────────────────────────────────────
    // Fixed to camera, offset adjusted in update()
    this.bg0 = this.add.tileSprite(0, 0, GAME_W, H, 'bgsheet', 0)
      .setOrigin(0).setScrollFactor(0).setDepth(0);
    this.bg1 = this.add.tileSprite(0, 0, GAME_W, H, 'bgsheet', 1)
      .setOrigin(0).setScrollFactor(0).setDepth(1).setAlpha(0.8);
    this.bg2 = this.add.tileSprite(0, H - 248, GAME_W, 248, 'bgsheet', 2)
      .setOrigin(0).setScrollFactor(0).setDepth(2).setAlpha(0.7);

    // Pine trees mid-ground
    const treeFrames = [0, 1, 2, 8, 9, 10, 16, 17, 18];
    for (let i = 0; i < 38; i++) {
      const x  = Phaser.Math.Between(0, W);
      const sc = Phaser.Math.FloatBetween(0.7, 1.5);
      this.add.image(x, H - 70 - sc * 52, 'pinetrees', treeFrames[i % treeFrames.length])
        .setScale(sc)
        .setScrollFactor(sc > 1.1 ? 0.25 : 0.15)
        .setDepth(3)
        .setAlpha(0.5 + sc * 0.08);
    }

    // ── PLATFORMS ────────────────────────────────────────────────
    this.platforms = this.physics.add.staticGroup();
    this.buildLevel(W, H);

    // ── PLAYER ───────────────────────────────────────────────────
    this.player = this.physics.add.sprite(120, H - 68, 'p-idle-0');
    this.player.setScale(1.5).setCollideWorldBounds(true).setDepth(10);
    this.player.body.setSize(30, 42);   // body.bottom = y+36, aligns with visual feet (8px transparent at bottom of 64px sprite)
    this.player.body.setOffset(17, 14); // center horizontally, skip top of frame
    this.setPlayerAnim('p-idle');

    // Shield ring visual — follows player when shield is active
    this.shieldRing = this.add.sprite(this.player.x, this.player.y, 'shield-ring', 0)
      .setScale(2.2).setDepth(9).setVisible(false).setAlpha(0.85);

    // ── ENEMIES ──────────────────────────────────────────────────
    this.enemies = this.physics.add.group();
    this.spawnEnemies(H);

    // ── BOXES ─────────────────────────────────────────────────────
    this.boxes = this.physics.add.staticGroup();
    this.spawnBoxes(H);

    // ── CHECKPOINTS ───────────────────────────────────────────────
    this.spawnCheckpoints(H);

    // ── PROJECTILE POOL ──────────────────────────────────────────
    // Pre-allocate fruit sprites; reuse via group.get() / killAndHide()
    // instead of creating/destroying on every throw → no GC hitches.
    this.fruitPool = this.physics.add.group({
      classType: Phaser.GameObjects.Sprite,
      maxSize: 20,
      runChildUpdate: false,
    });

    // Collectibles are now only found inside boxes (see spawnBoxes)
    this.collTriggers = this.physics.add.staticGroup();

    // ── GOAL ─────────────────────────────────────────────────────
    this.endSprite = this.add.image(W - 155, H - 100, 'end-idle').setScale(2).setDepth(5).setOrigin(0.5, 1);
    this.goalZone = this.add.zone(W - 155, H - 100, 80, 110).setOrigin(0.5);
    this.physics.world.enable(this.goalZone);
    this.goalZone.body.setAllowGravity(false);

    // ── COLLISIONS ───────────────────────────────────────────────
    this.physics.add.collider(this.player, this.platforms);
    this.physics.add.collider(this.enemies, this.platforms);
    this.physics.add.collider(this.player, this.boxes, this.onBoxHit, null, this);
    this.physics.add.overlap(this.player, this.enemies,      this.onEnemyContact, null, this);
    this.physics.add.overlap(this.player, this.collTriggers, this.onCollect,       null, this);
    this.physics.add.overlap(this.player, this.goalZone,     this.onGoalReached,   null, this);

    // ── CAMERA ───────────────────────────────────────────────────
    this.cameras.main.setBounds(0, 0, W, H);
    this.cameras.main.startFollow(this.player, true, 0.1, 0.12);

    // ── BACKGROUND MUSIC & SOUND EFFECTS ─────────────────────────
    // All audio loaded lazily here (after user clicked SPIEL STARTEN) so the
    // AudioContext is already active — avoids Phaser 3.60 audio-decode hang.
    this.music = null;
    const sfxBase = 'assets/sound-effects/';
    this.load.audio('music',         'assets/music2.mp3');
    this.load.audio('snd-jump',      sfxBase + 'Woosh_1.ogg');
    this.load.audio('snd-land',      sfxBase + 'Thud1.ogg');
    this.load.audio('snd-stomp',     sfxBase + 'Crunch_1.ogg');
    this.load.audio('snd-hurt',      sfxBase + 'Thudd1.mp3');
    this.load.audio('snd-shoe',      sfxBase + 'Woosh_2.ogg');
    this.load.audio('snd-blocked',   sfxBase + 'Parry1.ogg');
    this.load.audio('snd-collect',   sfxBase + 'Clickandrelease_1.ogg');
    this.load.audio('snd-win',       sfxBase + 'sucess1.mp3');
    this.load.audio('snd-gameover',  sfxBase + 'RegularShowShort.ogg');
    this.load.audio('snd-box-hit',   sfxBase + 'Clang1.ogg');
    this.load.audio('snd-box-break', sfxBase + 'Snap_1.ogg');
    this.load.on('loaderror', (file) => {
      console.warn('[SFX] Failed to load audio:', file.key, '→', file.src);
    });
    this.load.once('complete', () => {
      try {
        this.music = this.sound.add('music', { loop: true, volume: 0.35 });
        this.music.play();
      } catch(e) { console.warn('Music failed to start:', e); }
      const vol = (k, v) => {
        try {
          this[k] = this.sound.add(k, { volume: v });
        } catch(e) {
          console.warn('[SFX] sound.add failed for key:', k, e);
        }
      };
      vol('snd-jump',      0.30);
      vol('snd-land',      0.25);
      vol('snd-stomp',     0.50);
      vol('snd-hurt',      0.55);
      vol('snd-shoe',      0.28);
      vol('snd-blocked',   0.50);
      vol('snd-collect',   0.40);
      vol('snd-win',       0.55);
      vol('snd-gameover',  0.55);
      vol('snd-box-hit',   0.45);
      vol('snd-box-break', 0.50);
    });
    this.load.start();
    this.events.once('shutdown', () => { this.music?.stop(); });

    // ── INPUT ─────────────────────────────────────────────────────
    this.cursors  = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.aKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
    this.dKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
    this.wKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
    this.qKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Q);

    this.scene.launch('HUD', { gameScene: this });
  }

  // ── Only switch animation when it actually changes → no more flickering ──
  setPlayerAnim(key) {
    if (this.playerAnim !== key) {
      this.playerAnim = key;
      this.player.play(key, true);
    }
  }

  buildLevel(W, H) {
    const gfx = this.add.graphics().setDepth(4);

    const addPlat = (x, y, w, h = 20, col = 0x4a7c44) => {
      gfx.fillStyle(col);
      gfx.fillRect(x - w / 2, y - h / 2, w, h);
      if (h <= 22) { gfx.fillStyle(0x66bb6a); gfx.fillRect(x - w / 2, y - h / 2, w, 5); }
      const r = this.add.rectangle(x, y, w, h).setVisible(false);
      this.physics.add.existing(r, true);
      this.platforms.add(r);
    };

    addPlat(W / 2, H - 16, W, 32, 0x3e2723);

    [
      [340,  H-110, 180], [600,  H-185, 150], [860,  H-130, 200],
      [1150, H-210, 180], [1400, H-155, 200], [1660, H-248, 160], [1910, H-175, 220],
      [2210, H-295, 180], [2470, H-208, 200], [2720, H-158, 180], [2970, H-248, 220],
      [3260, H-192, 200], [3510, H-288, 180], [3760, H-203, 200], [4010, H-168, 180],
      [4290, H-243, 200], [4540, H-178, 180], [4790, H-298, 200], [5010, H-213, 220],
      [730,  H-325,  90], [1260, H-345,  90], [2060, H-395,  90],
      [2910, H-363,  90], [3660, H-415,  90], [4460, H-385,  90],
    ].forEach(([x, y, w]) => addPlat(x, y, w));
  }

  spawnEnemies(H) {
    // Spawn Y formula: platform top = H - platformCenter - 10
    //   body bottom = sprite.y + 36  (setSize 30×42, setOffset 17×14, scale 1.5)
    //   spawn_y = platform_top - 36 = H - platformCenter - 46
    // Ground (center H-16, top H-32): spawn_y = H-68
    [
      [500,  H-68,  'enemy1', 150],  // ground
      [860,  H-176, 'enemy2',  85],  // platform H-130 (top H-140)
      [1660, H-294, 'enemy1',  70],  // platform H-248 (top H-258)
      [2500, H-68,  'enemy2', 150],  // ground
      [3260, H-238, 'enemy1',  85],  // platform H-192 (top H-202)
      [4540, H-224, 'enemy2',  80],  // platform H-178 (top H-188)
    ].forEach(([x, y, key, patrol]) => {
      const e = this.physics.add.sprite(x, y, 'e-idle-0');
      e.setScale(1.5).setCollideWorldBounds(true).setDepth(8);
      if (key === 'enemy2') e.setTint(0xffbbcc);  // visual distinction
      e.enemyType   = key;
      e.patrolStart = x - patrol;
      e.patrolEnd   = x + patrol;
      e.direction   = 1;
      e.shootTimer  = Phaser.Math.Between(150, 300);
      e.attacking   = false;
      e.chasing     = false;
      e.jumpCooldown = 0;
      e.speedMult   = 1;
      e.body.setSize(30, 42);   // body.bottom = y+36, matches player body for consistent ground alignment
      e.body.setOffset(17, 14);
      this.setEnemyAnim(e, 'e-walk');
      this.enemies.add(e);
    });
  }

  setEnemyAnim(e, key) {
    e.play(key, true); // Phaser ignoreIfPlaying — no custom tracking needed
  }

  spawnCollectibles(H) {
    const colors = { shield: 0xffd700, star: 0xffff00, heart: 0xff3366, boots: 0x00ccff };
    const labels = { shield: 'SCHILD', star: 'STERN', heart: 'HERZ', boots: 'STIEFEL' };

    [
      [380,  H-165, 'shield'], [730,  H-378, 'star'  ],
      [1110, H-263, 'heart' ], [1660, H-308, 'boots' ],
      [2060, H-448, 'shield'], [2360, H-263, 'star'  ],
      [2720, H-213, 'heart' ], [3110, H-303, 'boots' ],
      [3510, H-343, 'shield'], [3760, H-468, 'star'  ],
      [4060, H-223, 'heart' ], [4460, H-438, 'boots' ],
    ].forEach(([x, y, type]) => {
      const col  = colors[type];
      const glow = this.add.circle(x, y, 22, col, 0.25).setDepth(5);
      const bg   = this.add.circle(x, y, 14, col, 0.95).setDepth(6);
      // Use a text label instead of emoji (avoids rendering inconsistencies)
      const lbl  = this.add.text(x, y, labels[type], {
        fontSize: '5px', fill: '#000000', fontFamily: '"Press Start 2P"'
      }).setOrigin(0.5).setDepth(7);

      const rect = this.add.rectangle(x, y, 30, 30).setVisible(false);
      this.physics.add.existing(rect, true);
      rect.bonusType = type;
      rect.visuals   = [glow, bg, lbl];
      this.collTriggers.add(rect);

      const floatTween = this.tweens.add({
        targets: [bg, lbl, glow], y: y - 8,
        duration: 900, yoyo: true, repeat: -1,
        ease: 'Sine.inOut', delay: Phaser.Math.Between(0, 800)
      });
      rect.floatTween = floatTween;
    });
  }

  // ════════════════════════════════
  //  UPDATE
  // ════════════════════════════════
  update() {
    if (this.gameOver || !this.player?.active) return;

    // Parallax scroll – offset based on camera X position
    const camX = this.cameras.main.scrollX;
    this.bg0.tilePositionX = camX * 0.05;
    this.bg1.tilePositionX = camX * 0.12;
    this.bg2.tilePositionX = camX * 0.22;

    this.handlePlayer();
    this.handleEnemies();
    this.checkProjectiles();

    // Update shield ring position
    if (this.shieldRing) {
      this.shieldRing.setPosition(this.player.x, this.player.y - 4)
        .setVisible(this.hasShield);
      if (this.hasShield && !this.shieldRing.anims.isPlaying) {
        this.shieldRing.play('shield-ring');
      }
    }
    this.checkPlayerApples();

    if (this.player.y > GAME_H + 100) {
      this.takeDamage();
      this.player.setPosition(this.respawnX, this.respawnY);
      this.player.setVelocity(0, 0);
    }
  }

  handlePlayer() {
    const rawOnGround = this.player.body.blocked.down;
    this.groundFrames = rawOnGround ? this.groundFrames + 1 : 0;
    const onGround = this.groundFrames >= 2;
    if (onGround) this.jumpCount = 0;

    // Landing sound: was in air, now on ground
    if (onGround && !this.wasOnGround) this['snd-land']?.play();
    this.wasOnGround = onGround;

    const left  = this.cursors.left.isDown  || this.aKey.isDown;
    const right = this.cursors.right.isDown || this.dKey.isDown;
    const jump  = Phaser.Input.Keyboard.JustDown(this.cursors.up)  ||
                  Phaser.Input.Keyboard.JustDown(this.spaceKey)    ||
                  Phaser.Input.Keyboard.JustDown(this.wKey);

    if (left) {
      this.player.setVelocityX(this.hasSpeed ? -310 : -190);
      this.player.setFlipX(true);
      if (onGround && !this.isHurt) this.setPlayerAnim('p-walk');
    } else if (right) {
      this.player.setVelocityX(this.hasSpeed ? 310 : 190);
      this.player.setFlipX(false);
      if (onGround && !this.isHurt) this.setPlayerAnim('p-walk');
    } else {
      this.player.setVelocityX(0);
      if (onGround && !this.isHurt) this.setPlayerAnim('p-idle');
    }

    // Only switch to jump animation if meaningfully airborne (velocity threshold
    // prevents idle↔jump flicker when physics blocked.down toggles on platform edges)
    if (!onGround && !this.isHurt && Math.abs(this.player.body.velocity.y) > 50) {
      this.setPlayerAnim(this.player.body.velocity.y < 0 ? 'p-jump' : 'p-fall');
    }

    if (jump && this.jumpCount < 2) {
      const vel = this.jumpCount === 0
        ? (this.hasSuperBoot ? -660 : -510) // first jump: -510 normal, -660 with super boots
        : -370;                              // double jump velocity
      this.player.setVelocityY(vel);
      this.jumpCount++;
      this['snd-jump']?.play();
      this.spawnParticles(this.player.x, this.player.y + 30, 0xffffff, 4);
    }

    // Apple throw
    if (Phaser.Input.Keyboard.JustDown(this.qKey) && this.hasApple && this.appleCount > 0) {
      this.throwPlayerApple();
    }
  }

  throwPlayerApple() {
    this.appleCount--;
    this.events.emit('appleCount', this.appleCount);
    if (this.appleCount <= 0) {
      this.hasApple = false;
      this.events.emit('appleOff');
    }
    const dirX = this.player.flipX ? -1 : 1;
    const sx = this.player.x + dirX * 30;
    const sy = this.player.y - 10;
    const apple = this.fruitPool.get(sx, sy, 'fruit-apple');
    if (!apple) return;
    apple.setActive(true).setVisible(true).setScale(1.5).setDepth(12);
    apple.play('fruit-apple');
    apple.body.reset(sx, sy);
    apple.body.setAllowGravity(false);
    apple.body.setGravityY(0);
    apple.body.setVelocity(dirX * 380, 0);
    apple.body.setSize(24, 24);
    apple.dirX  = dirX;
    apple.isActive = true;
    apple.isPlayerApple = true;
    this.playerApples.push(apple);
    this['snd-shoe']?.play();
    this.time.delayedCall(2500, () => this.destroyProjectile(apple));
  }

  checkPlayerApples() {
    if (!this.playerApples.length) return;
    for (let i = this.playerApples.length - 1; i >= 0; i--) {
      const ap = this.playerApples[i];
      if (!ap?.active || !ap.isActive) { this.playerApples.splice(i, 1); continue; }
      if (ap.body?.blocked.down || ap.body?.blocked.left || ap.body?.blocked.right) {
        this.destroyProjectile(ap); this.playerApples.splice(i, 1); continue;
      }
      let hit = false;
      this.enemies.getChildren().forEach(e => {
        if (!e.active || !ap.isActive || hit) return;
        const ab = ap.body, eb = e.body;
        if (Phaser.Geom.Intersects.RectangleToRectangle(
            new Phaser.Geom.Rectangle(ab.x, ab.y, ab.width, ab.height),
            new Phaser.Geom.Rectangle(eb.x, eb.y, eb.width, eb.height))) {
          hit = true;
          ap.isActive = false;
          this.destroyProjectile(ap);
          this.playerApples.splice(i, 1);
          this.score += 150;
          this.showFloat(e.x, e.y - 20, '+150 TREFFER!', '#ff6600');
          this.spawnParticles(e.x, e.y, 0xff6600, 8);
          this['snd-stomp']?.play();
          this.respawnEnemy(e);
          e.destroy();
        }
      });
    }
  }

  handleEnemies() {
    this.enemies.getChildren().forEach(e => {
      if (!e.active) return;
      e.speedMult = e.speedMult || 1; // guard: prevent NaN velocities if speedMult is missing
      const distX = this.player.x - e.x;
      const distY = this.player.y - e.y;
      const dist  = Math.abs(distX);
      const distYAbs = Math.abs(distY);

      // Decrement jump cooldown each frame
      if (e.jumpCooldown > 0) e.jumpCooldown--;

      // Determine chase/patrol mode
      const canChase = dist < 350 && distYAbs < 120;
      const chaseLimitX = 500;
      const patrolExtended = 200;

      if (canChase) {
        e.chasing = true;
      } else if (e.chasing) {
        // Stop chasing if player moves too far away or enemy is beyond extended patrol zone
        if (dist > chaseLimitX ||
            e.x < e.patrolStart - patrolExtended ||
            e.x > e.patrolEnd   + patrolExtended) {
          e.chasing = false;
        }
      }

      if (e.chasing) {
        // Chase mode — reduced speeds for better game feel
        const dir = distX > 0 ? 1 : -1;
        const baseSpeed = e.enemyType === 'enemy1' ? 75 : 90;
        const speed = baseSpeed * e.speedMult;
        e.setVelocityX(dir * speed);
        e.setFlipX(dir < 0);
        e.direction = dir;
        if (!e.attacking) this.setEnemyAnim(e, e.chasing ? 'e-run' : 'e-walk');

        // Jump up to chase player on a higher platform (player.y < e.y → distY < -80)
        if (distY < -80 && e.body.blocked.down && e.jumpCooldown === 0) {
          e.setVelocityY(-380);
          e.jumpCooldown = 120;
        }
      } else {
        // Patrol mode
        e.setVelocityX(e.direction * 38 * e.speedMult);
        e.setFlipX(e.direction < 0);
        if (!e.attacking) this.setEnemyAnim(e, 'e-walk');
        if (e.x <= e.patrolStart) e.direction =  1;
        if (e.x >= e.patrolEnd)   e.direction = -1;

        // Jump over obstacles/walls while patrolling so enemies can reach platforms
        if ((e.body.blocked.left || e.body.blocked.right) && e.body.blocked.down && e.jumpCooldown === 0) {
          e.setVelocityY(-380);
          e.jumpCooldown = 90;
        }
      }

      if (e.enemyType === 'enemy1') {
        e.shootTimer--;
        if (e.shootTimer <= 0 && dist < 400 && dist > 55) {
          e.shootTimer = e.chasing
            ? Phaser.Math.Between(100, 150)
            : Phaser.Math.Between(180, 280);
          this.throwFruit(e);
          e.attacking = true;
          this.setEnemyAnim(e, 'e-punch');
          this.time.delayedCall(650, () => {
            if (e?.active) {
              e.attacking = false;
              this.setEnemyAnim(e, 'e-walk');
            }
          });
        }
      }
    });
  }

  throwFruit(enemy) {
    const dirX = this.player.x < enemy.x ? -1 : 1;
    const sx   = enemy.x + dirX * 30;
    const sy   = enemy.y - 24;

    const fruitNames = ['apple','bananas','cherries','kiwi','melon','orange','pineapple','strawberry'];
    const fruitKey = 'fruit-' + Phaser.Utils.Array.GetRandom(fruitNames);

    // Get a pooled sprite (or null if pool is full — skip throw gracefully)
    const fruit = this.fruitPool.get(sx, sy, fruitKey);
    if (!fruit) return;

    fruit.setActive(true).setVisible(true).setScale(1.5).setDepth(12);
    fruit.play(fruitKey);

    fruit.body.reset(sx, sy);
    fruit.body.setAllowGravity(true);
    fruit.body.setGravityY(-600);         // mostly flat flight path
    fruit.body.setVelocity(dirX * 270, -50);
    fruit.body.setSize(24, 24);

    fruit.dirX     = dirX;
    fruit.isActive = true;
    this.projectiles.push(fruit);

    this['snd-shoe']?.play();
    this.time.delayedCall(3200, () => this.destroyProjectile(fruit));
  }

  destroyProjectile(projectile) {
    if (!projectile || !projectile.isActive) return;
    projectile.isActive = false;
    // Return to pool instead of destroying
    this.fruitPool.killAndHide(projectile);
    projectile.body.setVelocity(0, 0);
  }


  checkProjectiles() {
    // Use physics body bounds for tight hit detection (display bounds are inflated by scale)
    const p = this.player.body;
    const pb = new Phaser.Geom.Rectangle(p.x, p.y, p.width, p.height);
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      const shoe = this.projectiles[i];
      if (!shoe?.active || !shoe.isActive) {
        this.projectiles.splice(i, 1);
        continue;
      }
      // Hit a platform
      if (shoe.body?.blocked.down || shoe.body?.blocked.left || shoe.body?.blocked.right) {
        this.destroyProjectile(shoe);
        this.projectiles.splice(i, 1);
        continue;
      }
      // Hit player — use body bounds so only direct hits register
      const sb = shoe.body;
      if (sb && Phaser.Geom.Intersects.RectangleToRectangle(
          new Phaser.Geom.Rectangle(sb.x, sb.y, sb.width, sb.height), pb)) {
        this.destroyProjectile(shoe);
        this.projectiles.splice(i, 1);
        this.takeDamage();
      }
    }
  }

  onEnemyContact(player, enemy) {
    if (!enemy.active) return;
    if (player.body.velocity.y > 20 && player.body.bottom < enemy.body.center.y + 14) {
      this.score += 100;
      this.showFloat(enemy.x, enemy.y - 20, '+100', '#ffd700');
      this.spawnParticles(enemy.x, enemy.y, 0xff6666, 8);
      this['snd-stomp']?.play();
      this.respawnEnemy(enemy);
      enemy.destroy();
      player.setVelocityY(-300);
    } else {
      this.takeDamage();
    }
  }

  respawnEnemy(deadEnemy) {
    const H = GAME_H;
    const px = this.player.x;
    // Pick a spawn point 800-1200px away from player, clamped to level bounds
    const offset = Phaser.Math.Between(800, 1200) * (Math.random() < 0.5 ? -1 : 1);
    const spawnX = Phaser.Math.Clamp(px + offset, 60, LEVEL_W - 60);
    const spawnY = H - 68;
    const key    = deadEnemy.enemyType;
    const oldMult = deadEnemy.speedMult || 1;
    const newMult = Math.min(oldMult * 1.3, 1.6);
    const patrol  = 100;

    this.time.delayedCall(3000, () => {
      if (this.gameOver) return;
      const e = this.physics.add.sprite(spawnX, spawnY, 'e-idle-0');
      e.setScale(1.5).setCollideWorldBounds(true).setDepth(8);
      if (key === 'enemy2') e.setTint(0xffbbcc);
      e.enemyType    = key;
      e.patrolStart  = spawnX - patrol;
      e.patrolEnd    = spawnX + patrol;
      e.direction    = 1;
      e.shootTimer   = Phaser.Math.Between(120, 220);
      e.attacking    = false;
      e.chasing      = false;
      e.jumpCooldown = 0;
      e.speedMult    = newMult;
      e.body.setSize(30, 42);
      e.body.setOffset(17, 14);
      this.setEnemyAnim(e, 'e-walk');
      // Adding e to this.enemies automatically includes it in the group colliders
      // registered in create(): enemies↔platforms and player↔enemies.
      // Do NOT add per-object colliders here — they accumulate on every respawn.
      this.enemies.add(e);
      // Flash to signal respawn
      this.showFloat(spawnX, spawnY - 40, 'ZURÜCK!', '#ff6600');
    });
  }

  spawnBoxes(H) {
    // [x, y, boxType (1-3), reward ('shield'|'star'|'heart'|'boots'|'fruit')]
    // Box Y = bottom of box (origin 0.5, 1). Formula: platform_top - 89
    //   platform_top = H - platformCenter - 10
    //   so box_y = H - platformCenter - 99
    // This places the box 89px above the platform surface — player walks under it
    // and jumps up to hit it from below, breaking it open for the reward inside.
    // All power-ups come exclusively from boxes (no free-floating collectibles).
    const boxDefs = [
      [340,  H-209, 1, 'heart'  ],  // platform H-110 (top H-120)
      [600,  H-284, 2, 'speed'  ],  // platform H-185 (top H-195)
      [860,  H-229, 2, 'apple'  ],  // platform H-130 (top H-140)
      [1150, H-309, 3, 'shield' ],  // platform H-210 (top H-220)
      [1400, H-254, 1, 'apple'  ],  // platform H-155 (top H-165)
      [1910, H-274, 1, 'speed'  ],  // platform H-175 (top H-185)
      [2210, H-394, 2, 'heart'  ],  // platform H-295 (top H-305)
      [2470, H-307, 2, 'shield' ],  // platform H-208 (top H-218)
      [2970, H-347, 3, 'apple'  ],  // platform H-248 (top H-258)
      [3260, H-291, 1, 'shield' ],  // platform H-192 (top H-202)
      [3760, H-302, 3, 'speed'  ],  // platform H-203 (top H-213)
      [4290, H-342, 1, 'apple'  ],  // platform H-243 (top H-253)
      [4790, H-397, 3, 'heart'  ],  // platform H-298 (top H-308)
    ];
    boxDefs.forEach(([x, y, type, reward]) => {
      const key = `box${type}`;
      const img = this.add.image(x, y, `${key}-idle`).setScale(2).setDepth(5).setOrigin(0.5, 1);
      this.physics.add.existing(img, true);
      img.boxKey    = key;
      img.boxReward = reward;
      img.boxHit    = false;
      this.boxes.add(img);
    });
  }

  spawnCheckpoints(H) {
    // Place checkpoints roughly every 1300px through the 5200px level
    [1300, 2600, 3900].forEach((x, i) => {
      const y = H - 32; // sit on the ground
      const img = this.add.image(x, y, 'cp-noflag').setScale(2).setDepth(5).setOrigin(0.5, 1);
      // Invisible trigger zone overlapping the sprite
      const zone = this.add.zone(x, y - 32, 64, 80).setOrigin(0.5, 1);
      this.physics.world.enable(zone);
      zone.body.setAllowGravity(false);
      zone.cpImage    = img;
      zone.cpActivated = false;
      zone.cpIndex    = i;
      zone.respawnX   = x;
      zone.respawnY   = H - 68;
      this.physics.add.overlap(this.player, zone, this.onCheckpoint, null, this);
    });
  }

  onCheckpoint(player, zone) {
    if (zone.cpActivated) return;
    zone.cpActivated = true;
    zone.cpImage.setTexture('cp-idle');
    this.respawnX = zone.respawnX;
    this.respawnY = zone.respawnY;
    this.showFloat(zone.respawnX, zone.respawnY - 80, 'CHECKPOINT!', '#00ff88');
    this['snd-collect']?.play();
  }

  onBoxHit(player, box) {
    if (!box.active || box.boxHit) return;
    // Only trigger when player jumps up into the bottom of the box
    if (!this.player.body.blocked.up) return;
    box.boxHit = true;
    this.hitBox(box);
  }

  hitBox(box) {
    // Hit flash
    box.setTexture(`${box.boxKey}-hit`);
    this.cameras.main.shake(60, 0.005);
    this['snd-box-hit']?.play();

    this.time.delayedCall(100, () => {
      if (!box.active) return;
      box.setTexture(`${box.boxKey}-break`);
      this['snd-box-break']?.play();

      this.time.delayedCall(180, () => {
        if (!box.active) return;
        const rx = box.x;
        const ry = box.y - box.displayHeight;

        // Spawn reward
        if (box.boxReward === 'fruit') {
          const fruitNames = ['apple','bananas','cherries','kiwi','melon','orange','pineapple','strawberry'];
          const fk = 'fruit-' + Phaser.Utils.Array.GetRandom(fruitNames);
          const f = this.add.sprite(rx, ry - 20, fk).setScale(1.5).setDepth(7);
          f.play(fk);
          this.tweens.add({ targets: f, y: ry - 60, alpha: 0, duration: 800, onComplete: () => f.destroy() });
          this.score += 50;
          this.showFloat(rx, ry - 30, '+50', '#ffd700');
        } else {
          // Treat like a collectible pickup
          this.applyPowerup(box.boxReward, rx, ry);
        }

        this.spawnParticles(rx, ry, 0xc8a050, 6);
        this.boxes.remove(box, true, true);
      });
    });
  }

  // Shared power-up application (used by both box rewards and onCollect)
  applyPowerup(type, x, y) {
    this['snd-collect']?.play();
    this.score += 50;
    this.spawnParticles(x, y, 0xffffff, 6);
    switch (type) {
      case 'shield':
        this.hasShield = true;
        this.events.emit('shieldOn');
        this.showFloat(x, y - 30, 'SCHILD!', '#ffd700');
        break;
      case 'speed':
        this.hasSpeed = true;
        this.player.setTint(0x00ffff);
        this.events.emit('speedOn', 8000);
        this.showFloat(x, y - 30, 'TURBO!', '#00ffff');
        this.time.delayedCall(8000, () => {
          this.hasSpeed = false;
          this.player?.clearTint();
          this.events.emit('speedOff');
        });
        break;
      case 'heart':
        this.lives = Math.min(this.lives + 1, 5);
        this.events.emit('livesChanged', this.lives);
        this.showFloat(x, y - 30, '+1 LEBEN!', '#ff3366');
        break;
      case 'apple':
        this.hasApple = true;
        this.appleCount = 3;
        this.events.emit('appleOn', 3);
        this.showFloat(x, y - 30, '3 ÄPFEL! [Q]', '#ff6600');
        break;
    }
  }

  onCollect(player, trigger) {
    if (!trigger.active) return;
    const type = trigger.bonusType;
    trigger.floatTween?.stop();
    trigger.visuals?.forEach(v => v.destroy());
    trigger.destroy();
    this.applyPowerup(type, player.x, player.y - 30);
  }

  onGoalReached() {
    if (this.gameOver) return;
    this.gameOver = true;
    this.endSprite?.setTexture('end-press');
    this.physics.pause();
    this.music?.stop();
    this['snd-win']?.play();
    this.cameras.main.flash(500, 255, 255, 100);
    this.time.delayedCall(900, () => {
      this.scene.stop('HUD');
      this.scene.start('GameOver', { won: true, score: this.score });
    });
  }

  takeDamage() {
    if (this.isHurt || this.isStarPow || this.gameOver) return;
    if (this.hasShield) {
      this.hasShield = false;
      this.events.emit('shieldOff');
      this.showFloat(this.player.x, this.player.y - 50, 'GEBLOCKT!', '#ffd700');
      this['snd-blocked']?.play();
      this.cameras.main.shake(100, 0.006);
      return;
    }
    this.lives--;
    this.isHurt = true;
    this['snd-hurt']?.play();
    this.events.emit('livesChanged', this.lives);
    this.cameras.main.shake(220, 0.013);
    this.showFloat(this.player.x, this.player.y - 50, '-1 LEBEN', '#ff4444');

    // Force hurt animation
    this.player.play('p-hurt', true);
    this.playerAnim = 'p-hurt';
    this.player.setTint(0xff4444);

    const kDir = this.player.flipX ? 1 : -1;
    this.player.setVelocity(kDir * 200, -250);

    this.tweens.add({
      targets: this.player, alpha: 0.3, duration: 100, yoyo: true, repeat: 7,
      onComplete: () => {
        if (!this.player?.active) return;
        this.player.setAlpha(1);
        this.player.clearTint();
        this.isHurt = false;
        const onGround = this.player.body.blocked.down;
        const movingX = Math.abs(this.player.body.velocity.x) > 10;
        const airborne = Math.abs(this.player.body.velocity.y) > 50;
        if (!onGround && airborne) {
          this.playerAnim = this.player.body.velocity.y < 0 ? 'p-jump' : 'p-fall';
        } else if (onGround && movingX) {
          this.playerAnim = 'p-walk';
        } else {
          this.playerAnim = 'p-idle';
        }
      }
    });

    if (this.lives <= 0) {
      this.gameOver = true;
      this.music?.stop();
      this['snd-gameover']?.play();
      this.time.delayedCall(800, () => {
        this.scene.stop('HUD');
        this.scene.start('GameOver', { won: false, score: this.score });
      });
    }
  }

  showFloat(x, y, msg, color = '#fff') {
    const t = this.add.text(x, y, msg, {
      fontSize: '11px', fill: color,
      fontFamily: '"Press Start 2P"',
      stroke: '#000000', strokeThickness: 3
    }).setOrigin(0.5).setDepth(20);
    this.tweens.add({
      targets: t, y: y - 55, alpha: 0, duration: 1200,
      ease: 'Cubic.Out', onComplete: () => t.destroy()
    });
  }

  spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = this.add.circle(x, y, Phaser.Math.Between(3, 7), color).setDepth(15);
      const a = Phaser.Math.Between(0, 360);
      const s = Phaser.Math.Between(70, 170);
      this.tweens.add({
        targets: p,
        x: x + Math.cos(a) * s * 0.8,
        y: y + Math.sin(a) * s * 0.8 - 35,
        alpha: 0, scaleX: 0.1, scaleY: 0.1,
        duration: Phaser.Math.Between(400, 750),
        onComplete: () => p.destroy()
      });
    }
  }
}

// ════════════════════════════════════
//  HUD SCENE
// ════════════════════════════════════
class HUDScene extends Phaser.Scene {
  constructor() { super({ key: 'HUD' }); }
  init(data) { this.gs = data.gameScene; }

  create() {
    const W = GAME_W;
    this.add.rectangle(W / 2, 22, W, 44, 0x000000, 0.52);

    // Health bar image (05.png, 8 frames from full to empty, each 48×32)
    this.livesBar = this.add.image(14, 22, 'health-bar', this.livesToFrame(3))
      .setOrigin(0, 0.5).setScale(1.8);

    this.shieldIcon = this.add.text(14, 38, '[SCHILD]', {
      fontSize: '8px', fill: '#ffd700', fontFamily: '"Press Start 2P"'
    }).setVisible(false);

    // Power-up bars (bonus-bars spritesheet)
    this.speedBar  = this.createBar(115, 36, 0x00ffff, 'TURBO');
    this.appleBar  = this.createAppleBar(115, 36);

    this.scoreTxt = this.add.text(W - 14, 9, 'PUNKTE: 0', {
      fontSize: '10px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setOrigin(1, 0);

    this.gs.events.on('livesChanged', n  => this.livesBar.setFrame(this.livesToFrame(n)));
    this.gs.events.on('shieldOn',     () => this.shieldIcon.setVisible(true));
    this.gs.events.on('shieldOff',    () => this.shieldIcon.setVisible(false));
    this.gs.events.on('speedOn',  ms => this.startBar(this.speedBar, ms, 'TURBO'));
    this.gs.events.on('speedOff', ()  => this.speedBar.setVisible(false));
    this.gs.events.on('appleOn',  n   => this.updateAppleBar(n));
    this.gs.events.on('appleCount', n => this.updateAppleBar(n));
    this.gs.events.on('appleOff',  ()  => this.appleBar.setVisible(false));

    this.time.addEvent({
      delay: 120, loop: true,
      callback: () => { if (this.gs) this.scoreTxt.setText('PUNKTE: ' + this.gs.score); }
    });

    this.events.on('shutdown', () => {
      ['livesChanged','shieldOn','shieldOff','speedOn','speedOff','appleOn','appleCount','appleOff']
        .forEach(ev => this.gs.events.off(ev));
    });
  }

  livesToFrame(n) {
    // 8 frames: 0=full(green) … 7=empty(black). Map 5 lives→0, 4→1, 3→2, 2→4, 1→6, 0→7
    return Math.min(7, Math.max(0, Math.round((5 - Math.min(n, 5)) * 1.4)));
  }

  createAppleBar(x, y) {
    const g = this.add.graphics().setVisible(false).setDepth(5);
    g.bx = x; g.by = y;
    return g;
  }

  updateAppleBar(count) {
    const g = this.appleBar;
    g.clear();
    g.setVisible(count > 0);
    if (count <= 0) return;
    // Draw up to 3 apple-pip circles
    g.fillStyle(0xff6600, 0.9);
    g.fillRoundedRect(g.bx, g.by, 75, 12, 4);
    g.fillStyle(0xff0000);
    for (let i = 0; i < 3; i++) {
      if (i < count) g.fillCircle(g.bx + 10 + i * 26, g.by + 6, 7);
      else { g.fillStyle(0x444444); g.fillCircle(g.bx + 10 + i * 26, g.by + 6, 7); g.fillStyle(0xff0000); }
    }
    this.add.text && void 0; // no-op
    // Label
    if (!g.lbl) {
      g.lbl = this.add.text(g.bx + 75 + 4, g.by, 'APFEL [Q]', {
        fontSize: '7px', fill: '#ff6600', fontFamily: '"Press Start 2P"'
      }).setDepth(6);
    }
    g.lbl.setVisible(count > 0);
  }

  createBar(x, y, color) {
    const g = this.add.graphics();
    g.bx = x; g.by = y; g.bc = color;
    return g.setVisible(false).setDepth(5);
  }

  startBar(bar, duration, label) {
    bar.setVisible(true);
    const started = this.time.now;
    const lbl = this.add.text(bar.bx, bar.by - 10, label, {
      fontSize: '7px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setDepth(6);
    const interval = this.time.addEvent({
      delay: 50, loop: true,
      callback: () => {
        const t = Math.max(0, 1 - (this.time.now - started) / duration);
        bar.clear();
        bar.fillStyle(0x000000, 0.5);
        bar.fillRect(bar.bx, bar.by, 90, 7);
        bar.fillStyle(bar.bc);
        bar.fillRect(bar.bx, bar.by, 90 * t, 7);
        if (t <= 0) { bar.setVisible(false); lbl.destroy(); interval.remove(); }
      }
    });
  }
}

// ════════════════════════════════════
//  GAME OVER SCENE
// ════════════════════════════════════
class GameOverScene extends Phaser.Scene {
  constructor() { super({ key: 'GameOver' }); }
  init(d) { this.won = d.won; this.score = d.score || 0; }

  create() {
    const W = GAME_W, H = GAME_H;
    this.add.tileSprite(0, 0, W, H, 'bgsheet', 0).setOrigin(0);
    this.add.rectangle(W / 2, H / 2, W, H, 0x000000, this.won ? 0.4 : 0.65);

    if (this.won) {
      for (let i = 0; i < 50; i++) {
        const s = this.add.text(
          Phaser.Math.Between(0, W), Phaser.Math.Between(0, H),
          '*', { fontSize: `${Phaser.Math.Between(12, 28)}px`, fill: '#ffd700' }
        );
        this.tweens.add({ targets: s, alpha: 0.1, duration: Phaser.Math.Between(600, 1400), yoyo: true, repeat: -1 });
      }
    }

    this.add.text(W / 2, 120, this.won ? 'GEWONNEN!' : 'GAME OVER', {
      fontSize: '26px', fill: this.won ? '#ffd700' : '#ff4444',
      fontFamily: '"Press Start 2P"', stroke: '#000', strokeThickness: 5
    }).setOrigin(0.5);

    this.add.text(W / 2, 205, 'PUNKTE: ' + this.score, {
      fontSize: '18px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);

    this.add.text(W / 2, 300,
      this.won
        ? 'Du hast alle Muetter ueberlebt!\n    HELD DES SPIELPLATZES!'
        : 'Die Muetter waren zu stark...\n      Versuch es nochmal!',
      { fontSize: '12px', fill: '#cccccc', fontFamily: '"Press Start 2P"', align: 'center', lineSpacing: 10 }
    ).setOrigin(0.5);

    this.makeBtn(W / 2, 420, 'NOCHMAL',     this.won ? '#1e6e3a' : '#8b1a1a',
      () => { this.fade(() => this.scene.start('Game')); });
    this.makeBtn(W / 2, 490, 'HAUPTMENUE',  '#1a2a3a',
      () => { this.fade(() => this.scene.start('Menu')); });
  }

  fade(cb) {
    this.cameras.main.fadeOut(300, 0, 0, 0);
    this.time.delayedCall(300, cb);
  }

  makeBtn(x, y, label, bg, cb) {
    const btn = this.add.text(x, y, '  ' + label + '  ', {
      fontSize: '16px', fill: '#fff', fontFamily: '"Press Start 2P"',
      backgroundColor: bg, padding: { x: 14, y: 10 }
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    btn.on('pointerover',  () => btn.setAlpha(0.8));
    btn.on('pointerout',   () => btn.setAlpha(1.0));
    btn.on('pointerdown',  cb);
  }
}

new Phaser.Game({
