<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kid vs. Mütter 👦👵</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
  </style>
</head>
<body>
<div id="game"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  SPRITE-KONFIGURATION – hier anpassen wenn nötig
// ═══════════════════════════════════════════════
// character.png ist 224×544 → 7 Spalten × 17 Zeilen à 32×32 px
const CHAR = {
  frameW: 32, frameH: 32,
  // Frame-Index = Zeile × 7 + Spalte
  idle:  { start: 0,  end: 3  },  // Zeile 0 – stehend
  walkR: { start: 35, end: 41 },  // Zeile 5 – gehen rechts
  jump:  { start: 14, end: 14 },  // Zeile 2 – sprung
  hurt:  { start: 42, end: 43 },  // Zeile 6 – verletzt
};

// NPC_OldWoman_0x.png sind je 288×288 → 6 Spalten × 6 Zeilen à 48×48 px
const NPC = {
  frameW: 48, frameH: 48,
  // Frame-Index = Zeile × 6 + Spalte
  idle:   { start: 0,  end: 1  },  // Zeile 0
  walk:   { start: 6,  end: 10 },  // Zeile 1
  attack: { start: 12, end: 14 },  // Zeile 2
};

const GAME_W = 800;
const GAME_H = 560;
const LEVEL_W = 5200;

// ════════════════════════════════════
//  BOOT-SZENE: Laden & Animationen
// ════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor() { super({ key: 'Boot' }); }

  preload() {
    // Lade-Balken
    const bar = this.add.rectangle(GAME_W / 2 - 200, GAME_H / 2, 0, 14, 0x4ecdc4).setOrigin(0, 0.5);
    this.add.rectangle(GAME_W / 2, GAME_H / 2, 404, 18, 0x333344).setOrigin(0.5);
    this.add.text(GAME_W / 2, GAME_H / 2 - 30, 'LADEN...', {
      fontSize: '12px', fill: '#fff', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);
    this.load.on('progress', v => { bar.width = 400 * v; });

    // Sprites laden
    this.load.spritesheet('player', 'assets/character.png',    { frameWidth: CHAR.frameW, frameHeight: CHAR.frameH });
    this.load.spritesheet('enemy1', 'assets/NPC_OldWoman_01.png', { frameWidth: NPC.frameW,  frameHeight: NPC.frameH  });
    this.load.spritesheet('enemy2', 'assets/NPC_OldWoman_02.png', { frameWidth: NPC.frameW,  frameHeight: NPC.frameH  });
  }

  create() {
    // ── Spieler-Animationen ──
    const pa = (key, src, start, end, rate, repeat = -1) =>
      this.anims.create({ key, frames: this.anims.generateFrameNumbers(src, { start, end }), frameRate: rate, repeat });

    pa('p-idle',  'player', CHAR.idle.start,  CHAR.idle.end,  6);
    pa('p-walkR', 'player', CHAR.walkR.start, CHAR.walkR.end, 10);
    pa('p-jump',  'player', CHAR.jump.start,  CHAR.jump.end,  1, 0);
    pa('p-hurt',  'player', CHAR.hurt.start,  CHAR.hurt.end,  8, 0);

    // ── Gegner-Animationen ──
    pa('e1-idle',   'enemy1', NPC.idle.start,   NPC.idle.end,   4);
    pa('e1-walk',   'enemy1', NPC.walk.start,   NPC.walk.end,   8);
    pa('e1-attack', 'enemy1', NPC.attack.start, NPC.attack.end, 8, 0);
    pa('e2-idle',   'enemy2', NPC.idle.start,   NPC.idle.end,   4);
    pa('e2-walk',   'enemy2', NPC.walk.start,   NPC.walk.end,   8);
    pa('e2-attack', 'enemy2', NPC.attack.start, NPC.attack.end, 8, 0);

    this.scene.start('Menu');
  }
}

// ════════════════════════════════════
//  MENU-SZENE
// ════════════════════════════════════
class MenuScene extends Phaser.Scene {
  constructor() { super({ key: 'Menu' }); }

  create() {
    const W = GAME_W, H = GAME_H;

    // Hintergrund
    const gradient = this.add.graphics();
    gradient.fillGradientStyle(0x1a0a2e, 0x1a0a2e, 0x0a1a3e, 0x0a1a3e, 1);
    gradient.fillRect(0, 0, W, H);

    // Sterne
    for (let i = 0; i < 100; i++) {
      this.add.circle(
        Phaser.Math.Between(0, W), Phaser.Math.Between(0, H * 0.7),
        Phaser.Math.FloatBetween(0.5, 2), 0xffffff,
        Phaser.Math.FloatBetween(0.3, 1)
      );
    }

    // Boden
    this.add.rectangle(W / 2, H - 20, W, 40, 0x3d2b1f);

    // Spieler- und Gegner-Vorschau
    const prevPlayer = this.add.sprite(200, H - 60, 'player').setScale(3).play('p-idle');
    const prevE1     = this.add.sprite(500, H - 55, 'enemy1').setScale(2.5).play('e1-walk');
    const prevE2     = this.add.sprite(620, H - 55, 'enemy2').setScale(2.5).play('e2-walk');
    prevE1.setFlipX(true);

    // Titel
    this.add.text(W / 2, 70, 'KID vs. MÜTTER', {
      fontSize: '28px', fill: '#ffd700', fontFamily: '"Press Start 2P"',
      stroke: '#7b0000', strokeThickness: 6
    }).setOrigin(0.5);

    this.add.text(W / 2, 115, 'rettet den Spielplatz!', {
      fontSize: '10px', fill: '#ffaaaa', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);

    // Steuerung Box
    const box = this.add.rectangle(W / 2, 220, 500, 100, 0x000000, 0.4);
    const controls = ['← → / A D   Bewegen', 'LEERTASTE / ↑    Springen', 'Zweimal springen möglich!'];
    controls.forEach((c, i) =>
      this.add.text(W / 2, 190 + i * 26, c, {
        fontSize: '10px', fill: '#aaddff', fontFamily: '"Press Start 2P"'
      }).setOrigin(0.5)
    );

    // Bonus-Legende
    this.add.text(W / 2, 300, 'EINSAMMELN:', {
      fontSize: '10px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);

    const bonuses = [
      ['🛡️', 'Schild – nächsten Treffer absorbieren'],
      ['⭐', 'Stern – 5 Sek. unverwundbar'],
      ['❤️', 'Herz – +1 Leben'],
      ['👟', 'Stiefel – höher springen (10 Sek.)'],
    ];
    bonuses.forEach(([icon, text], i) =>
      this.add.text(W / 2, 328 + i * 26, `${icon}  ${text}`, {
        fontSize: '9px', fill: '#cccccc', fontFamily: '"Press Start 2P"'
      }).setOrigin(0.5)
    );

    // Start-Knopf
    const btn = this.add.text(W / 2, 460, ' ▶  SPIEL STARTEN ', {
      fontSize: '18px', fill: '#ffffff',
      fontFamily: '"Press Start 2P"',
      backgroundColor: '#c0392b',
      padding: { x: 18, y: 10 }
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    btn.on('pointerover',  () => btn.setStyle({ fill: '#ffd700' }));
    btn.on('pointerout',   () => btn.setStyle({ fill: '#ffffff' }));
    btn.on('pointerdown',  () => {
      this.cameras.main.fadeOut(400, 0, 0, 0);
      this.time.delayedCall(400, () => this.scene.start('Game'));
    });
    this.tweens.add({ targets: btn, alpha: 0.75, duration: 600, yoyo: true, repeat: -1 });
  }
}

// ════════════════════════════════════
//  HAUPT-SPIEL-SZENE
// ════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'Game' }); }

  init() {
    this.lives       = 3;
    this.score       = 0;
    this.hasShield   = false;
    this.isStarPow   = false;   // Stern-Unverwundbarkeit
    this.hasSuperBoot= false;   // Extra-Sprung-Kraft
    this.isHurt      = false;
    this.jumpCount   = 0;
    this.gameOver    = false;
  }

  create() {
    const W = LEVEL_W;
    const H = GAME_H;

    // ── Physik-Welt ──
    this.physics.world.setBounds(0, 0, W, H + 300);

    // ── Hintergrund (scrollt langsam) ──
    const sky = this.add.graphics().setScrollFactor(0.15);
    sky.fillGradientStyle(0x87CEEB, 0x87CEEB, 0xfff4b0, 0xfff4b0, 1);
    sky.fillRect(0, 0, W * 0.15, H); // Kleine Welt wegen ScrollFactor

    // Sonne
    this.add.circle(700, 80, 55, 0xfff176, 0.9).setScrollFactor(0.1);
    this.add.circle(700, 80, 44, 0xffee58).setScrollFactor(0.1);

    // Wolken
    for (let i = 0; i < 20; i++) {
      const cx = Phaser.Math.Between(0, W);
      const cy = Phaser.Math.Between(20, 160);
      const cw = Phaser.Math.Between(80, 200);
      const g = this.add.graphics().setScrollFactor(Phaser.Math.FloatBetween(0.15, 0.4));
      g.fillStyle(0xffffff, 0.85);
      g.fillEllipse(cx, cy, cw, cw * 0.45);
      g.fillEllipse(cx - cw * 0.2, cy + 6, cw * 0.7, cw * 0.35);
      g.fillEllipse(cx + cw * 0.2, cy + 6, cw * 0.7, cw * 0.35);
    }

    // Berge im Hintergrund
    for (let i = 0; i < 14; i++) {
      const mx = i * 420 + 100;
      const mh = Phaser.Math.Between(120, 260);
      const bg = this.add.graphics().setScrollFactor(0.3);
      bg.fillStyle(0x9cbe9c, 1);
      bg.fillTriangle(mx, H - 30, mx - mh * 0.7, H - 30, mx, H - 30 - mh);
      bg.fillTriangle(mx, H - 30, mx + mh * 0.7, H - 30, mx, H - 30 - mh);
    }

    // ── Plattformen ──
    this.platforms = this.physics.add.staticGroup();
    this.buildLevel(W, H);

    // ── Spieler ──
    this.player = this.physics.add.sprite(120, H - 100, 'player');
    this.player.setScale(2.6);
    this.player.setCollideWorldBounds(true);
    this.player.setBounce(0.05);
    this.player.setDepth(10);
    this.player.body.setSize(CHAR.frameW * 0.55, CHAR.frameH * 0.88);
    this.player.body.setOffset(CHAR.frameW * 0.22, CHAR.frameH * 0.1);
    this.player.play('p-idle');

    // ── Gegner ──
    this.enemies     = this.physics.add.group();
    this.projectiles = this.physics.add.group();
    this.spawnEnemies(H);

    // ── Sammel-Gegenstände ──
    this.collectibles = [];
    this.collTriggers = this.physics.add.staticGroup();
    this.spawnCollectibles(H);

    // ── Ziel-Flagge ──
    this.add.text(W - 160, H - 160, '🏁', { fontSize: '52px' }).setDepth(5);
    this.goalZone = this.add.zone(W - 160, H - 100, 80, 100).setOrigin(0.5);
    this.physics.world.enable(this.goalZone);
    this.goalZone.body.setAllowGravity(false);

    // ── Kollisionen ──
    this.physics.add.collider(this.player, this.platforms);
    this.physics.add.collider(this.enemies, this.platforms);
    this.physics.add.collider(this.projectiles, this.platforms, (p) => p.destroy());

    this.physics.add.overlap(this.player, this.enemies,     this.onEnemyContact, null, this);
    this.physics.add.overlap(this.player, this.projectiles, this.onProjectileHit, null, this);
    this.physics.add.overlap(this.player, this.collTriggers, this.onCollect,      null, this);
    this.physics.add.overlap(this.player, this.goalZone,    this.onGoalReached,   null, this);

    // ── Kamera ──
    this.cameras.main.setBounds(0, 0, W, H);
    this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

    // ── Eingabe ──
    this.cursors  = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.aKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
    this.dKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
    this.wKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);

    // ── HUD starten ──
    this.scene.launch('HUD', { gameScene: this });
  }

  // ─── Level aufbauen ───────────────────────────────────────────
  buildLevel(W, H) {
    const gfx = this.add.graphics();

    const addPlat = (x, y, w, h, col = 0x66BB6A) => {
      // Visuelle Darstellung
      gfx.fillStyle(col);
      gfx.fillRect(x - w / 2, y - h / 2, w, h);
      // Gras oben
      if (col === 0x66BB6A) {
        gfx.fillStyle(0x43A047);
        gfx.fillRect(x - w / 2, y - h / 2, w, 5);
      }
      // Physik-Körper
      const rect = this.add.rectangle(x, y, w, h);
      rect.setVisible(false);
      this.physics.add.existing(rect, true);
      this.platforms.add(rect);
    };

    // Boden
    addPlat(W / 2, H - 16, W, 32, 0x5D4037);

    // Level-Abschnitte [x, y, breite]
    const platData = [
      // Sektion 1 – Einstieg
      [340,  H-110, 180], [600,  H-185, 150], [850,  H-130, 200],
      // Sektion 2
      [1150, H-210, 180], [1400, H-155, 200], [1650, H-245, 160],
      [1900, H-175, 220],
      // Sektion 3
      [2200, H-295, 180], [2460, H-205, 200], [2710, H-155, 180],
      [2960, H-245, 220],
      // Sektion 4
      [3250, H-190, 200], [3500, H-285, 180], [3750, H-200, 200],
      [4000, H-165, 180],
      // Sektion 5 – Endgerade
      [4280, H-240, 200], [4530, H-175, 180], [4780, H-295, 200],
      [5000, H-210, 220],
      // Hohe Plattformen für Extras
      [720,  H-320, 100], [1250, H-340, 100], [2050, H-390, 100],
      [2900, H-360, 100], [3650, H-410, 100], [4450, H-380, 100],
    ];
    platData.forEach(([x, y, w]) => addPlat(x, y, w, 20));
  }

  // ─── Gegner spawnen ───────────────────────────────────────────
  spawnEnemies(H) {
    // [x, y, typ, patrouille-Halbbreite]
    const data = [
      [420,  H - 75,  'enemy1', 100],
      [820,  H - 75,  'enemy2', 80 ],
      [1200, H - 185, 'enemy1', 90 ],
      [1620, H - 225, 'enemy2', 65 ],
      [2050, H - 75,  'enemy1', 110],
      [2380, H - 185, 'enemy2', 75 ],
      [2750, H - 75,  'enemy1', 95 ],
      [3100, H - 225, 'enemy2', 70 ],
      [3520, H - 265, 'enemy1', 85 ],
      [3880, H - 75,  'enemy2', 90 ],
      [4310, H - 220, 'enemy1', 80 ],
      [4650, H - 75,  'enemy2', 100],
      [4970, H - 190, 'enemy1', 90 ],
    ];

    data.forEach(([x, y, key, patrol]) => {
      const e = this.physics.add.sprite(x, y, key);
      e.setScale(2.0);
      e.setCollideWorldBounds(true);
      e.setBounce(0);
      e.setDepth(8);
      e.enemyType = key;
      e.patrolStart = x - patrol;
      e.patrolEnd   = x + patrol;
      e.direction   = 1;
      e.shootCooldown = Phaser.Math.Between(60, 180); // zufälliger Start
      e.body.setSize(NPC.frameW * 0.55, NPC.frameH * 0.8);
      e.body.setOffset(NPC.frameW * 0.22, NPC.frameH * 0.15);
      e.play(key === 'enemy1' ? 'e1-walk' : 'e2-walk');
      this.enemies.add(e);
    });
  }

  // ─── Sammel-Items spawnen ──────────────────────────────────────
  spawnCollectibles(H) {
    const types = { shield: '🛡️', star: '⭐', heart: '❤️', boots: '👟' };
    const colors = { shield: 0xffd700, star: 0xffff00, heart: 0xff3366, boots: 0x00ccff };

    const items = [
      [380,  H-165, 'shield'],
      [720,  H-375, 'star'  ],
      [1100, H-260, 'heart' ],
      [1650, H-305, 'boots' ],
      [2050, H-445, 'shield'],
      [2350, H-260, 'star'  ],
      [2710, H-210, 'heart' ],
      [3100, H-300, 'boots' ],
      [3500, H-340, 'shield'],
      [3750, H-465, 'star'  ],
      [4050, H-220, 'heart' ],
      [4450, H-435, 'boots' ],
    ];

    items.forEach(([x, y, type]) => {
      // Glüh-Kreis
      const glow = this.add.circle(x, y, 20, colors[type], 0.35).setDepth(4);
      const bg   = this.add.circle(x, y, 14, colors[type], 0.9).setDepth(5);
      const icon = this.add.text(x, y, types[type], { fontSize: '18px' })
        .setOrigin(0.5).setDepth(6);

      // Unsichtbarer Physik-Trigger
      const rect = this.add.rectangle(x, y, 28, 28);
      rect.setVisible(false);
      this.physics.add.existing(rect, true);
      rect.bonusType = type;
      rect.visuals   = [glow, bg, icon];
      this.collTriggers.add(rect);

      // Schwebc-Animation
      this.tweens.add({
        targets: [bg, icon, glow],
        y: y - 9,
        duration: 900,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.inOut',
        offset: Phaser.Math.Between(0, 900)
      });
    });
  }

  // ════════════════════════════════════
  //  UPDATE – läuft jeden Frame
  // ════════════════════════════════════
  update() {
    if (this.gameOver || !this.player?.active) return;

    this.handlePlayer();
    this.handleEnemies();

    // Spieler fällt aus der Welt
    if (this.player.y > GAME_H + 120) {
      this.takeDamage();
      this.player.setPosition(Math.max(100, this.player.x - 200), GAME_H - 150);
      this.player.setVelocity(0, 0);
    }
  }

  // ─── Spieler-Steuerung ────────────────────────────────────────
  handlePlayer() {
    const onGround = this.player.body.blocked.down;
    if (onGround) this.jumpCount = 0;

    const left  = this.cursors.left.isDown  || this.aKey.isDown;
    const right = this.cursors.right.isDown || this.dKey.isDown;
    const jump  = Phaser.Input.Keyboard.JustDown(this.cursors.up) ||
                  Phaser.Input.Keyboard.JustDown(this.spaceKey)   ||
                  Phaser.Input.Keyboard.JustDown(this.wKey);
    const speed = 185;
    const jumpV = this.hasSuperBoot ? -660 : -490;

    if (left) {
      this.player.setVelocityX(-speed);
      this.player.setFlipX(true);
      if (onGround) this.player.play('p-walkR', true);
    } else if (right) {
      this.player.setVelocityX(speed);
      this.player.setFlipX(false);
      if (onGround) this.player.play('p-walkR', true);
    } else {
      this.player.setVelocityX(0);
      if (onGround) this.player.play('p-idle', true);
    }

    // Sprung + Doppelsprung
    if (jump && this.jumpCount < 2) {
      this.player.setVelocityY(jumpV);
      this.jumpCount++;
      this.player.play('p-jump', true);
      // Kleiner Sprung-Effekt
      this.spawnParticles(this.player.x, this.player.y + 30, 0xffffff, 4);
    }
  }

  // ─── Gegner-Verhalten ─────────────────────────────────────────
  handleEnemies() {
    this.enemies.getChildren().forEach(e => {
      if (!e.active) return;

      const distToPlayer = Phaser.Math.Distance.Between(e.x, e.y, this.player.x, this.player.y);

      // Gegner Typ 2 (Stock) – verfolgt den Spieler
      if (e.enemyType === 'enemy2' && distToPlayer < 280) {
        const dir = this.player.x < e.x ? -1 : 1;
        e.setVelocityX(dir * 75);
        e.setFlipX(dir < 0);
        e.play('e2-walk', true);
        return;
      }

      // Patrouille für beide Typen
      e.setVelocityX(e.direction * 55);
      e.setFlipX(e.direction < 0);
      if (e.x <= e.patrolStart) { e.direction =  1; }
      if (e.x >= e.patrolEnd)   { e.direction = -1; }

      // Gegner Typ 1 (Schuh) – schießt auf Spieler
      if (e.enemyType === 'enemy1') {
        e.shootCooldown--;
        if (e.shootCooldown <= 0 && distToPlayer < 380 && distToPlayer > 50) {
          e.shootCooldown = Phaser.Math.Between(100, 160);
          this.throwShoe(e);
        }
      }
    });
  }

  // ─── Schuh werfen ─────────────────────────────────────────────
  throwShoe(enemy) {
    const dir = this.player.x < enemy.x ? -1 : 1;

    const shoe = this.add.text(enemy.x + dir * 20, enemy.y - 15, '👟', {
      fontSize: '20px'
    }).setDepth(9);
    this.physics.add.existing(shoe);
    shoe.body.setAllowGravity(true);
    shoe.body.setGravityY(-400); // fast gar kein Schwerkraft → flache Kurve
    shoe.body.setVelocity(dir * 240, -70);
    shoe.body.setSize(24, 24);
    this.projectiles.add(shoe);

    // Rotations-Tween
    this.tweens.add({ targets: shoe, angle: dir * 360, duration: 600, repeat: -1 });

    // Auto-Zerstörung
    this.time.delayedCall(3200, () => { if (shoe?.active) shoe.destroy(); });

    enemy.play('e1-attack', true);
    this.time.delayedCall(600, () => { if (enemy?.active) enemy.play('e1-walk', true); });
  }

  // ─── Kollisions-Callbacks ─────────────────────────────────────
  onEnemyContact(player, enemy) {
    if (!enemy.active) return;

    // Stomp-Check: Spieler fällt von oben
    const falling    = player.body.velocity.y > 30;
    const fromAbove  = player.body.bottom < enemy.body.center.y + 10;

    if (falling && fromAbove) {
      // Gegner besiegt!
      this.score += 100;
      this.showFloatText(enemy.x, enemy.y - 20, '+100 👊', '#ffd700');
      this.spawnParticles(enemy.x, enemy.y, 0xff4444, 8);
      enemy.destroy();
      player.setVelocityY(-320); // Rückprall
    } else {
      this.takeDamage();
    }
  }

  onProjectileHit(player, proj) {
    proj.destroy();
    this.takeDamage();
  }

  onCollect(player, trigger) {
    if (!trigger.active) return;
    const type = trigger.bonusType;

    // Visuals entfernen
    trigger.visuals?.forEach(v => v.destroy());
    trigger.destroy();

    this.score += 50;
    this.spawnParticles(player.x, player.y - 20, 0xffffff, 6);

    switch (type) {
      case 'shield':
        this.hasShield = true;
        this.events.emit('shieldOn');
        this.showFloatText(player.x, player.y - 50, '🛡️ Schild!', '#ffd700');
        break;

      case 'star':
        this.isStarPow = true;
        this.player.setTint(0xffff44);
        this.events.emit('starOn', 5000);
        this.showFloatText(player.x, player.y - 50, '⭐ Unverwundbar!', '#ffff00');
        this.time.delayedCall(5000, () => {
          this.isStarPow = false;
          if (this.player?.active) this.player.clearTint();
          this.events.emit('starOff');
        });
        break;

      case 'heart':
        this.lives = Math.min(this.lives + 1, 5);
        this.events.emit('livesChanged', this.lives);
        this.showFloatText(player.x, player.y - 50, '❤️ +1 Leben!', '#ff3366');
        break;

      case 'boots':
        this.hasSuperBoot = true;
        this.events.emit('bootsOn', 10000);
        this.showFloatText(player.x, player.y - 50, '👟 Super-Sprung!', '#00ccff');
        this.time.delayedCall(10000, () => {
          this.hasSuperBoot = false;
          this.events.emit('bootsOff');
        });
        break;
    }
  }

  onGoalReached() {
    if (this.gameOver) return;
    this.gameOver = true;
    this.physics.pause();
    this.cameras.main.flash(500, 255, 255, 100);

    this.time.delayedCall(800, () => {
      this.scene.stop('HUD');
      this.scene.start('GameOver', { won: true, score: this.score });
    });
  }

  // ─── Schaden nehmen ───────────────────────────────────────────
  takeDamage() {
    if (this.isHurt || this.isStarPow || this.gameOver) return;

    if (this.hasShield) {
      this.hasShield = false;
      this.events.emit('shieldOff');
      this.showFloatText(this.player.x, this.player.y - 50, '🛡️ Abgefangen!', '#ffd700');
      this.flashPlayer(0xffd700, 3);
      return;
    }

    this.lives--;
    this.isHurt = true;
    this.events.emit('livesChanged', this.lives);
    this.cameras.main.shake(200, 0.012);
    this.player.play('p-hurt', true);
    this.flashPlayer(0xff0000, 6);

    // Rückstoß
    const kDir = this.player.flipX ? 1 : -1;
    this.player.setVelocity(kDir * 220, -240);

    this.time.delayedCall(1300, () => {
      this.isHurt = false;
      if (this.player?.active) this.player.play('p-idle', true);
    });

    if (this.lives <= 0) {
      this.gameOver = true;
      this.time.delayedCall(700, () => {
        this.scene.stop('HUD');
        this.scene.start('GameOver', { won: false, score: this.score });
      });
    }
  }

  // ─── Hilfsfunktionen ──────────────────────────────────────────
  flashPlayer(color, reps) {
    this.tweens.add({
      targets: this.player, alpha: 0.25,
      duration: 90, yoyo: true, repeat: reps,
      onComplete: () => {
        this.player?.setAlpha(1);
        this.player?.clearTint();
      }
    });
    this.player.setTint(color);
  }

  showFloatText(x, y, msg, color) {
    const cam = this.cameras.main;
    const t = this.add.text(x, y, msg, {
      fontSize: '13px', fill: color,
      fontFamily: '"Press Start 2P"',
      stroke: '#000000', strokeThickness: 3
    }).setOrigin(0.5).setDepth(20);

    this.tweens.add({
      targets: t,
      y: y - 55,
      alpha: 0,
      duration: 1300,
      ease: 'Cubic.Out',
      onComplete: () => t.destroy()
    });
  }

  spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = this.add.circle(x, y, Phaser.Math.Between(3, 7), color).setDepth(15);
      const angle = Phaser.Math.Between(0, 360);
      const speed = Phaser.Math.Between(60, 160);
      this.tweens.add({
        targets: p,
        x: x + Math.cos(angle) * speed * 0.8,
        y: y + Math.sin(angle) * speed * 0.8 - 40,
        alpha: 0,
        scaleX: 0.1, scaleY: 0.1,
        duration: Phaser.Math.Between(400, 800),
        onComplete: () => p.destroy()
      });
    }
  }
}

// ════════════════════════════════════
//  HUD-SZENE (Overlay)
// ════════════════════════════════════
class HUDScene extends Phaser.Scene {
  constructor() { super({ key: 'HUD' }); }

  init(data) { this.gs = data.gameScene; }

  create() {
    const W = GAME_W;

    // Hintergrund-Leiste oben
    this.add.rectangle(W / 2, 22, W, 44, 0x000000, 0.5);

    // Leben
    this.livesDisplay = this.add.text(16, 10, '❤️❤️❤️', { fontSize: '22px' });

    // Aktive Boni
    this.shieldIcon = this.add.text(16, 34, '🛡️', { fontSize: '18px' }).setVisible(false);
    this.starBar    = this.createTimerBar(45, 38, 0xffff00).setVisible(false);
    this.bootBar    = this.createTimerBar(45, 38, 0x00ccff).setVisible(false);

    // Punkte
    this.scoreTxt = this.add.text(W - 16, 10, 'PUNKTE: 0', {
      fontSize: '10px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setOrigin(1, 0);

    // Event-Listener
    this.gs.events.on('livesChanged',  (n) => this.livesDisplay.setText('❤️'.repeat(Math.max(0, n))));
    this.gs.events.on('shieldOn',      ()  => this.shieldIcon.setVisible(true));
    this.gs.events.on('shieldOff',     ()  => this.shieldIcon.setVisible(false));
    this.gs.events.on('starOn',   (ms) => this.startBar(this.starBar, ms));
    this.gs.events.on('starOff',  ()  => this.starBar.setVisible(false));
    this.gs.events.on('bootsOn',  (ms) => this.startBar(this.bootBar, ms));
    this.gs.events.on('bootsOff', ()  => this.bootBar.setVisible(false));

    // Score-Update-Schleife
    this.time.addEvent({
      delay: 100,
      callback: () => { if (this.gs) this.scoreTxt.setText('PUNKTE: ' + this.gs.score); },
      loop: true
    });

    // Aufräumen beim Beenden
    this.events.on('shutdown', () => {
      ['livesChanged','shieldOn','shieldOff','starOn','starOff','bootsOn','bootsOff']
        .forEach(ev => this.gs.events.off(ev));
    });
  }

  createTimerBar(x, y, color) {
    const g = this.add.graphics();
    g.barX = x; g.barY = y; g.barColor = color;
    g.setDepth(5);
    return g;
  }

  startBar(bar, duration) {
    bar.setVisible(true);
    const started = this.time.now;
    bar.barTimer = this.time.addEvent({
      delay: 50,
      callback: () => {
        const t = Math.max(0, 1 - (this.time.now - started) / duration);
        bar.clear();
        bar.fillStyle(0x000000, 0.5);
        bar.fillRect(bar.barX, bar.barY, 100, 8);
        bar.fillStyle(bar.barColor, 1);
        bar.fillRect(bar.barX, bar.barY, 100 * t, 8);
      },
      loop: true
    });
  }
}

// ════════════════════════════════════
//  GAME-OVER / WIN-SZENE
// ════════════════════════════════════
class GameOverScene extends Phaser.Scene {
  constructor() { super({ key: 'GameOver' }); }
  init(d) { this.won = d.won; this.score = d.score || 0; }

  create() {
    const W = GAME_W, H = GAME_H;

    // Hintergrund
    const col = this.won ? 0x0a2b12 : 0x2b0a0a;
    this.add.rectangle(W / 2, H / 2, W, H, col, 0.93);

    // Sterne bei Sieg
    if (this.won) {
      for (let i = 0; i < 80; i++) {
        const s = this.add.text(
          Phaser.Math.Between(0, W), Phaser.Math.Between(0, H),
          '⭐', { fontSize: `${Phaser.Math.Between(10, 24)}px` }
        );
        this.tweens.add({ targets: s, alpha: 0.1, duration: Phaser.Math.Between(600, 1400), yoyo: true, repeat: -1 });
      }
    }

    // Titel
    const titleText = this.won ? '🎉 GEWONNEN! 🎉' : '💀 GAME OVER 💀';
    const titleColor = this.won ? '#ffd700' : '#ff4444';
    this.add.text(W / 2, 130, titleText, {
      fontSize: '26px', fill: titleColor,
      fontFamily: '"Press Start 2P"',
      stroke: '#000', strokeThickness: 5
    }).setOrigin(0.5);

    // Score
    this.add.text(W / 2, 210, `PUNKTE: ${this.score}`, {
      fontSize: '18px', fill: '#ffffff', fontFamily: '"Press Start 2P"'
    }).setOrigin(0.5);

    // Nachricht
    const msg = this.won
      ? 'Du hast alle Mütter überlebt!\n\n     HELD DES SPIELPLATZES! 🏆'
      : 'Die Mütter waren zu stark...\n\n    Versuch es nochmal! 💪';
    this.add.text(W / 2, 300, msg, {
      fontSize: '13px', fill: '#cccccc',
      fontFamily: '"Press Start 2P"',
      align: 'center',
      lineSpacing: 10
    }).setOrigin(0.5);

    // Knöpfe
    this.makeBtn(W / 2, 420, ' 🔄  NOCHMAL ', this.won ? '#1e8449' : '#c0392b',
      () => { this.cameras.main.fadeOut(300, 0, 0, 0); this.time.delayedCall(300, () => this.scene.start('Game')); });
    this.makeBtn(W / 2, 490, ' 🏠  MENÜ ', '#2c3e50',
      () => { this.cameras.main.fadeOut(300, 0, 0, 0); this.time.delayedCall(300, () => this.scene.start('Menu')); });
  }

  makeBtn(x, y, label, bg, cb) {
    const btn = this.add.text(x, y, label, {
      fontSize: '16px', fill: '#fff',
      fontFamily: '"Press Start 2P"',
      backgroundColor: bg,
      padding: { x: 16, y: 10 }
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    btn.on('pointerover',  () => btn.setAlpha(0.8));
    btn.on('pointerout',   () => btn.setAlpha(1));
    btn.on('pointerdown',  cb);
    return btn;
  }
}

// ════════════════════════════════════
//  PHASER STARTEN
// ════════════════════════════════════
const config = {
  type: Phaser.AUTO,
  width:  GAME_W,
  height: GAME_H,
  parent: 'game',
  backgroundColor: '#87CEEB',
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 620 },
      debug: false   // auf true setzen um Hitboxen zu sehen
    }
  },
  scene: [BootScene, MenuScene, GameScene, HUDScene, GameOverScene]
};

new Phaser.Game(config);
</script>
