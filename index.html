<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kind vs Müttern 👦👵</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }
    /* Orientation warning — shown only on touch devices in portrait */
    #rotate-message {
      display: none;
      position: fixed; z-index: 9999;
      inset: 0; background: #0d0d1a;
      color: #fff; font-family: 'Bangers', cursive;
      font-size: 28px;
      flex-direction: column; gap: 20px;
      align-items: center; justify-content: center;
      text-align: center; padding: 20px;
    }
    #rotate-message .icon { font-size: 60px; }
    @media (orientation: portrait) and (pointer: coarse) {
      #rotate-message { display: flex; }
      #game { display: none; }
    }
  </style>
</head>
<body>

<div id="rotate-message">
  <div class="icon">📱↔️</div>
  <div>Bitte drehe dein Gerät<br>ins Querformat!</div>
</div>

<div id="game"></div>

<!-- Phaser 3 engine -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

<!-- Game modules (loaded in dependency order) -->
<script src="js/constants.js"></script>
<script src="js/sfx.js"></script>
<script src="js/BootScene.js"></script>
<script src="js/MenuScene.js"></script>
<script src="js/GameScene.js"></script>
<script src="js/HUDScene.js"></script>
<script src="js/GameOverScene.js"></script>
<script src="js/TouchControlsScene.js"></script>
<script src="js/main.js"></script>

</body>
</html>
